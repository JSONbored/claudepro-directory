# Package Release Workflow
#
# Automatically releases the mcp-server package to npm when a namespaced tag
# is pushed. Uses the reusable package-release composite action for consistent
# release behavior across all packages.
#
# **What it does:**
# 1. Builds and tests the package
# 2. Extracts version from namespaced tag (e.g., mcp-server-v1.0.0 → 1.0.0)
# 3. Verifies package.json version matches tag version
# 4. Generates changelog automatically (if git-cliff is available)
# 5. Publishes to npm
# 6. Creates GitHub Release with changelog notes
#
# **Trigger:**
# Push a namespaced tag:
# ```bash
# git tag mcp-server-v1.0.0
# git push origin main --tags
# ```
#
# **Prerequisites:**
# - package.json version must match tag version (e.g., 1.0.0)
# - NPM_TOKEN secret must be configured in GitHub repository
#
# **Related:**
# - .github/actions/package-release/action.yml - Reusable release composite action
# - packages/mcp-server/.github/workflows/ci.yml - CI workflow
# - packages/mcp-server/README.md - Version management documentation
name: MCP Server Release

on:
  push:
    tags:
      - 'mcp-server-v*.*.*' # Matches mcp-server-v1.2.3 format

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write # Required to create GitHub releases
      id-token: write # Required for npm publish (OIDC)

    steps:
      - uses: ./.github/actions/package-release
        with:
          package-path: packages/mcp-server
          package-name: mcp-server
          node-version: '22'
          pnpm-version: '10'
          auto-generate-changelog: 'true'
