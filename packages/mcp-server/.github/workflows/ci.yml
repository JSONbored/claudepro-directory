# Package CI Workflow
#
# Runs CI checks for the mcp-server package when files in packages/mcp-server/
# are changed. Uses the reusable package-ci composite action for consistent
# CI behavior across all packages.
#
# **What it does:**
# - Type checks the package
# - Builds the package
# - Runs all tests
#
# **Trigger:**
# - Push to any branch (when packages/mcp-server/** files change)
# - Pull requests (when packages/mcp-server/** files change)
#
# **Related:**
# - .github/actions/package-ci/action.yml - Reusable CI composite action
# - packages/mcp-server/.github/workflows/release.yml - Release workflow
name: MCP Server CI

on:
  push:
    branches: ['**']
    paths:
      - 'packages/mcp-server/**'
      - '.github/actions/package-ci/**'
      - '.trunk/configs/jest.config.cjs'
      - 'config/tools/eslint.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: ['**']
    paths:
      - 'packages/mcp-server/**'
      - '.github/actions/package-ci/**'
      - '.trunk/configs/jest.config.cjs'
      - 'config/tools/eslint.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: ./.github/actions/package-ci
        with:
          package-path: packages/mcp-server
          node-version: '22'
          pnpm-version: '10'
