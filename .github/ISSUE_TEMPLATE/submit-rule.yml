name: Submit rule
description: Submit a Claude rule entry for the directory.
title: "Submit Rule: "
labels:
  - submission
  - rules
body:
  - type: markdown
    attributes:
      value: |
        Submit a complete rule that can be copied directly into real use.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Next.js Performance Architect
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: nextjs-performance-architect
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: rules
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: rules, standards, quality
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this rule enforces and where it applies.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Full copyable rule content
      render: markdown
      placeholder: Paste full rule content.
    validations:
      required: true
  - type: textarea
    id: caveats
    attributes:
      label: Caveats / constraints (optional)
      placeholder: Known caveats, constraints, or boundaries.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm this does not include viewCount, copyCount, or popularityScore fields.
          required: true
