name: Submit hook
description: Submit a Claude hook entry for the directory.
title: "Submit Hook: "
labels:
  - submission
  - hooks
body:
  - type: markdown
    attributes:
      value: |
        Include trigger, script/config, and practical usage so maintainers can validate quickly.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Slack Progress Notifier
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: slack-progress-notifier
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: hooks
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: hooks, automation, claude-code
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this hook does and when to use it.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: dropdown
    id: trigger
    attributes:
      label: Trigger
      options:
        - PreToolUse
        - PostToolUse
        - UserPromptSubmit
        - Notification
        - Stop
        - SubagentStop
        - SessionStart
    validations:
      required: true
  - type: textarea
    id: usage_snippet
    attributes:
      label: Usage snippet
      render: markdown
      placeholder: How someone wires this into Claude Code.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Full copyable hook script/config
      render: markdown
      placeholder: Paste full script/config so it can be tested directly.
    validations:
      required: true
  - type: textarea
    id: config_snippet
    attributes:
      label: Config snippet (optional)
      render: markdown
      placeholder: Optional config block.
    validations:
      required: false
  - type: input
    id: script_language
    attributes:
      label: Script language (optional)
      placeholder: bash, python, javascript
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm this includes enough information to run and test the hook.
          required: true
