name: Submit skill
description: Submit a Claude skill entry for the directory.
title: "Submit Skill: "
labels:
  - submission
  - skills
body:
  - type: markdown
    attributes:
      value: |
        Submit a reusable skill with practical install and usage details.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Zod Schema Validator
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: zod-schema-validator
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: skills
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: download_url
    attributes:
      label: Download URL (optional)
      placeholder: https://... or /downloads/skill.zip
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: skills, workflow, automation
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this skill enables and where to use it.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: input
    id: install_command
    attributes:
      label: Install command (required unless download URL is provided)
      placeholder: claude skill install my-skill
    validations:
      required: false
  - type: textarea
    id: usage_snippet
    attributes:
      label: Usage snippet
      render: markdown
      placeholder: Describe how to invoke and use the skill.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Copy snippet / full usable asset (optional)
      render: markdown
      placeholder: Optional full copyable skill content.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm this does not include frontmatter counters; voting is DB-owned.
          required: true
