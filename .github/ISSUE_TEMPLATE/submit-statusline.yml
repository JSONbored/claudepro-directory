name: Submit statusline
description: Submit a Claude statusline entry for the directory.
title: "Submit Statusline: "
labels:
  - submission
  - statuslines
body:
  - type: markdown
    attributes:
      value: |
        Include language, usage, and full script/config so users can copy and run quickly.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Minimal Powerline Statusline
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: minimal-powerline
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: statuslines
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: statusline, shell, cli
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this statusline shows and why it is useful.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: dropdown
    id: script_language
    attributes:
      label: Script language
      options:
        - bash
        - zsh
        - fish
        - python
        - javascript
        - other
    validations:
      required: true
  - type: textarea
    id: usage_snippet
    attributes:
      label: Usage snippet
      render: markdown
      placeholder: How to wire this into statusline config.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Full copyable statusline script/config
      render: markdown
      placeholder: Paste full script/config.
    validations:
      required: true
  - type: textarea
    id: config_snippet
    attributes:
      label: Config snippet (optional)
      render: markdown
      placeholder: Optional config block.
    validations:
      required: false
