name: Submit agent
description: Submit a Claude agent entry for the directory.
title: "Submit Agent: "
labels:
  - content-submission
  - agents
body:
  - type: markdown
    attributes:
      value: |
        Submit a complete, copyable Claude agent prompt/config. No fake metrics.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Agent Skills Framework Engineer
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: agent-skills-framework-engineer
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: agents
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: agent, productivity
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this does, why it matters, and when to use it.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Full copyable agent prompt/config
      render: markdown
      placeholder: Paste the complete usable prompt/config.
    validations:
      required: true
  - type: textarea
    id: install_or_usage
    attributes:
      label: Install/usage (optional)
      placeholder: Real install command or practical usage notes.
    validations:
      required: false
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm this does not include fake counters or popularity metrics.
          required: true
        - label: I confirm the copied asset is complete and directly usable.
          required: true
