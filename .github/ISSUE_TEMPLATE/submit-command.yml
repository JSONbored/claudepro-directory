name: Submit command
description: Submit a Claude command entry for the directory.
title: "Submit Command: "
labels:
  - submission
  - commands
body:
  - type: markdown
    attributes:
      value: |
        Submit a real, copy-paste command entry with complete syntax and usage.
  - type: input
    id: name
    attributes:
      label: Name
      placeholder: /debug - Debugging Assistant Command
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Kebab-case only
      placeholder: debug
    validations:
      required: true
  - type: input
    id: category
    attributes:
      label: Category
      value: commands
    validations:
      required: true
  - type: input
    id: github_url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/owner/repo
    validations:
      required: false
  - type: input
    id: docs_url
    attributes:
      label: Docs URL
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Author
      placeholder: GitHub handle or name
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      placeholder: you@example.com
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated
      placeholder: commands, workflow, productivity
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: 1-3 sentences
      placeholder: Explain what this command does and when to use it.
    validations:
      required: true
  - type: textarea
    id: card_description
    attributes:
      label: Card description
      description: Short browse preview text
      placeholder: Short preview users see on browse cards.
    validations:
      required: true
  - type: input
    id: command_syntax
    attributes:
      label: Command syntax
      placeholder: /debug [path] [options]
    validations:
      required: true
  - type: textarea
    id: usage_snippet
    attributes:
      label: Usage snippet
      render: markdown
      placeholder: Provide practical usage examples.
    validations:
      required: true
  - type: textarea
    id: full_copyable_content
    attributes:
      label: Full copyable command content
      render: markdown
      placeholder: Paste the complete command content.
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Submission checks
      options:
        - label: I confirm command syntax and examples are realistic and copy-paste ready.
          required: true
