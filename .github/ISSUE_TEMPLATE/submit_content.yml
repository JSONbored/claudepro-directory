name: Submit Content
description: Submit new agents, MCP servers, rules, commands, hooks, skills, statuslines, or collections
title: "[Submit]: "
labels: ["content-submission", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit Your Content

        Thank you for contributing to HeyClaude.

        This project now treats GitHub as the submission backend.

        Before opening the issue, review:

        - The current site flow at [heyclau.de/submit](https://heyclau.de/submit)
        - Existing entries in the repository README
        - The relevant category folder under `content/`

        Preferred contribution path:

        1. Open a pull request with the new or updated MDX file
        2. Regenerate the README awesome list
        3. Include any related download asset under `content/skills/` if needed

        If you are not ready to open a PR, use this issue template so the content can still be reviewed.

        ### Content Types Supported

        - **Agents**: AI agent configurations and prompts
        - **MCP Servers**: Model Context Protocol servers
        - **Rules**: Claude Code rules and guidelines
        - **Commands**: Slash commands for Claude Code
        - **Hooks**: Git hooks and automation scripts
        - **Skills**: Reusable skill packages
        - **Statuslines**: Status line configurations
        - **Collections**: Curated content collections

        ---

        **Ready to submit? Visit [claudepro.directory/submit](https://claudepro.directory/submit) now!**

  - type: dropdown
    id: content_type
    attributes:
      label: Content Type
      description: What type of content are you submitting?
      options:
        - Agent
        - MCP Server
        - Rule
        - Command
        - Hook
        - Skill
        - Statusline
        - Collection
    validations:
      required: true

  - type: textarea
    id: content_summary
    attributes:
      label: Content Summary
      description: Describe the content you want added
      placeholder: |
        - Title:
        - Slug:
        - Category:
        - Description:
        - Author:
        - Source URL:
        - Download URL (if any):
        - Tags:
      render: markdown
    validations:
      required: true

  - type: textarea
    id: content_body
    attributes:
      label: MDX Body or Link to Draft
      description: Paste the proposed content body or link to a gist/branch/PR
      placeholder: |
        Paste the MDX body here, or link to a draft branch / gist / pull request.
      render: markdown
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: I have read the [submission guidelines](https://claudepro.directory/help)
          required: false
        - label: I have checked for an existing duplicate entry
          required: true
        - label: My submission can be represented as a file-backed MDX entry
          required: true
        - label: I have tested my configuration, prompt, or asset before submitting
          required: true
