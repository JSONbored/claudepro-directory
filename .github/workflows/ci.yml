---
# CI Pipeline
# Optimizations: path-based filtering, parallel jobs, shallow
# clones (fetch-depth: 1), Turbo cache
# Uses actions/checkout@v6 for improved performance and sparse
# checkout support
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run full code quality check at 4 PM UTC daily (cron uses UTC time)
    - cron: '0 16 * * *'

# Cancel in-progress runs when new commits pushed (saves resources)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Required for Turbo remote cache; builds without these use
  # local cache only
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Fast path detection - only checkout minimal history needed
  # for path filtering
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      mcp-server: ${{ steps.filter.outputs.mcp-server }}
      web: ${{ steps.filter.outputs.web }}
      generators: ${{ steps.filter.outputs.generators }}
      content: ${{ steps.filter.outputs.content }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - '!packages/mcp-server/**'
            mcp-server:
              - 'packages/mcp-server/**'
            web:
              - 'apps/web/**'
            generators:
              - 'packages/generators/**'
            content:
              - 'content/**'

  # Parallel jobs - run independently after changes detection
  # Only run if relevant paths changed (saves resources)
  type-check:
    name: Type Check
    needs: changes
    if: >-
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.generators == 'true') &&
      needs.changes.outputs.mcp-server != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Checkout first to make composite action files available
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          skip-checkout: true
      # Cache Trunk tools and linters for faster CI runs
      - name: Cache Trunk
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            trunk-${{ runner.os }}-
      - name: Type check
        run: pnpm type-check
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

  build:
    name: Build
    needs: changes
    if: >-
      (needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.generators == 'true') &&
      needs.changes.outputs.mcp-server != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Checkout first to make composite action files available
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          skip-checkout: true # Already checked out above
      # Cache Trunk tools and linters for faster CI runs
      - name: Cache Trunk
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            trunk-${{ runner.os }}-
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: >-
            ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: >-
            ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}

  test:
    name: Test
    needs: changes
    if: >-
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.generators == 'true') &&
      needs.changes.outputs.mcp-server != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Checkout first to make composite action files available
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          skip-checkout: true # Already checked out above
      # Cache Trunk tools and linters for faster CI runs
      - name: Cache Trunk
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            trunk-${{ runner.os }}-
      - name: Run tests
        run: pnpm test:all
        env:
          TURBO_TOKEN: ${{ env.TURBO_TOKEN }}
          TURBO_TEAM: ${{ env.TURBO_TEAM }}
      # Upload test results to Trunk Flaky Tests
      # This step runs even if tests fail (if: always()) to capture flaky test data
      - name: Upload test results to Trunk Flaky Tests
        if: always() # Upload even if tests fail
        continue-on-error: true # Don't fail CI if upload fails
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: '.trunk/test-results/**/*.xml'
          org-slug: ${{ secrets.TRUNK_ORG_SLUG }}
          token: ${{ secrets.TRUNK_API_TOKEN }}
      # Clean up stale test result files after upload
      # Prevents stale files from being included in future test runs
      - name: Clean up test result files
        if: always()
        run: |
          rm -rf .trunk/test-results/jest/*.xml
          rm -rf .trunk/test-results/playwright/*.xml
          echo "✅ Test result files cleaned up"

  trunk-check:
    name: Trunk Code Quality
    needs: changes
    if: >-
      (needs.changes.outputs.packages == 'true' ||
       needs.changes.outputs.web == 'true' ||
       needs.changes.outputs.generators == 'true') &&
      needs.changes.outputs.mcp-server != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          skip-checkout: true
      # Cache Trunk tools and linters for faster CI runs
      - name: Cache Trunk
        uses: actions/cache@v4
        with:
          path: ~/.cache/trunk
          key: trunk-${{ runner.os }}-${{ hashFiles('.trunk/trunk.yaml') }}
          restore-keys: |
            trunk-${{ runner.os }}-
      - name: Trunk Code Quality
        uses: trunk-io/trunk-action@v1
        with:
          post-annotations: true
