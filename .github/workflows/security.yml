# Security Scanning
# Optimizations: path-based filtering, conditional jobs, shallow clones, cancels in-progress
# Uses actions/checkout@v6 (fetch-depth: 1 for CodeQL)
# Note: TruffleHog and Dependency Review removed - now handled by Trunk git hooks (trufflehog-scan-pre-commit/pre-push, osv-scanner-pre-commit/pre-push, dependency-audit-pre-push)
name: Security

on:
  # Weekly scheduled scan (Monday 3am UTC) - comprehensive analysis
  schedule:
    - cron: '0 3 * * 1'
  # Only on PRs (not every push) - path-based filtering
  pull_request:
    branches: [main]
    paths:
      - 'apps/**/*.{ts,tsx,js,jsx}'
      - 'packages/**/*.{ts,tsx,js,jsx}'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/security.yml'
  # Manual trigger for on-demand scanning
  workflow_dispatch:

env:
  PNPM_VERSION: 10.25.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # CodeQL (only on schedule, not blocking)
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 6
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1 # Shallow clone - CodeQL doesn't need full history

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
