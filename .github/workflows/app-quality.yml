name: App Quality

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    concurrency:
      group: app-quality-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter web type-check

      - name: Build
        run: pnpm build
