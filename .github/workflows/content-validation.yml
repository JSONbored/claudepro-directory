name: Content Validation

on:
  pull_request:
    paths:
      - "content/**"
      - "scripts/**"
      - "examples/content/**"
      - ".github/workflows/content-validation.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/**"
      - "examples/content/**"
      - ".github/workflows/content-validation.yml"
      - "package.json"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  validate-content:
    runs-on: ubuntu-latest
    concurrency:
      group: content-validation-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate content schema
        run: pnpm validate:content:strict

      - name: Validate downloadable packages
        run: pnpm validate:packages

      - name: Audit content report
        run: pnpm audit:content

      - name: Verify README is up to date
        run: |
          pnpm generate:readme
          git diff --exit-code README.md

      - name: Build web app
        run: pnpm build
