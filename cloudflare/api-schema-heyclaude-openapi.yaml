openapi: 3.0.3
info:
  title: HeyClaude API
  version: 1.0.0
servers:
  - url: https://heyclau.de
  - url: https://dev.heyclau.de
components:
  securitySchemes:
    OriginCheck:
      type: apiKey
      in: header
      name: Origin
      description: Public API requests are protected with origin checks and route-level rate limits.
    AdminBearer:
      type: http
      scheme: bearer
      description: Token required for listing lead review and status transitions.
security:
  - OriginCheck: []
paths:
  /api/votes/query:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                keys:
                  type: array
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[a-z0-9-]+:[a-z0-9-]+$"
                clientId:
                  type: string
                  minLength: 1
                  maxLength: 128
              required:
                - keys
      responses:
        "200":
          description: Query succeeded
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: Internal error
  /api/votes/toggle:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  type: string
                  pattern: "^[a-z0-9-]+:[a-z0-9-]+$"
                clientId:
                  type: string
                  minLength: 8
                  maxLength: 128
                vote:
                  type: boolean
              required:
                - key
                - clientId
                - vote
      responses:
        "200":
          description: Toggle succeeded
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: Internal error
        "503":
          description: Site DB not configured
  /api/newsletter/subscribe:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 320
                source:
                  type: string
                  maxLength: 64
              required:
                - email
      responses:
        "200":
          description: Subscribe accepted
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "502":
          description: Provider error
        "503":
          description: Not configured
  /api/newsletter/webhook:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                type:
                  type: string
                data:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Webhook accepted
        "400":
          description: Invalid JSON
        "401":
          description: Invalid signature
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "502":
          description: Notification failed
        "503":
          description: Webhook not configured
  /api/download:
    get:
      parameters:
        - in: query
          name: asset
          required: true
          schema:
            type: string
            maxLength: 256
            anyOf:
              - pattern: "^/downloads/skills/[a-z0-9-]+\\.zip$"
              - pattern: "^/downloads/mcp/[a-z0-9-]+\\.mcpb$"
      responses:
        "200":
          description: Download served
        "400":
          description: Invalid asset
        "404":
          description: Not found
        "429":
          description: Rate limited
  /api/registry/manifest:
    get:
      summary: Fetch the versioned registry artifact manifest
      responses:
        "200":
          description: Registry manifest
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  schemaVersion:
                    type: integer
                  generatedAt:
                    type: string
                    format: date-time
                  totalEntries:
                    type: integer
                  artifacts:
                    type: object
                    additionalProperties:
                      type: string
                required:
                  - schemaVersion
                  - generatedAt
                  - totalEntries
                  - artifacts
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/categories:
    get:
      summary: Fetch active registry categories
      responses:
        "200":
          description: Category envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  generatedAt:
                    type: string
                    format: date-time
                  count:
                    type: integer
                  entries:
                    type: array
                    maxItems: 16
                    items:
                      type: object
                      additionalProperties: true
                required:
                  - schemaVersion
                  - generatedAt
                  - count
                  - entries
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/search:
    get:
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 120
        - in: query
          name: category
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Search succeeded against the compact registry search artifact
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  query:
                    type: string
                  category:
                    type: string
                  count:
                    type: integer
                  results:
                    type: array
                    maxItems: 50
                    items:
                      type: object
                      additionalProperties: true
                required:
                  - schemaVersion
                  - query
                  - category
                  - count
                  - results
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/entries/{category}/{slug}:
    get:
      summary: Fetch one full registry entry
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: path
          name: slug
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Entry detail envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  key:
                    type: string
                  entry:
                    type: object
                    additionalProperties: true
                required:
                  - schemaVersion
                  - key
                  - entry
        "403":
          description: Forbidden origin
        "404":
          description: Entry not found
        "429":
          description: Rate limited
  /api/registry/entries/{category}/{slug}/llms:
    get:
      summary: Fetch one per-entry LLM text artifact
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: path
          name: slug
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Plain-text LLM export for one entry
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Forbidden origin
        "404":
          description: Entry LLM artifact not found
        "429":
          description: Rate limited
  /api/listing-leads:
    post:
      summary: Create a job or tool listing lead
      description: Stores hiring and tools/apps/services listing inquiries in D1 for manual review and follow-up.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                kind:
                  type: string
                  enum:
                    - job
                    - tool
                tierInterest:
                  type: string
                  enum:
                    - free
                    - standard
                    - featured
                    - sponsored
                contactName:
                  type: string
                  minLength: 1
                  maxLength: 160
                contactEmail:
                  type: string
                  format: email
                  maxLength: 320
                companyName:
                  type: string
                  minLength: 1
                  maxLength: 180
                listingTitle:
                  type: string
                  minLength: 1
                  maxLength: 180
                websiteUrl:
                  type: string
                  format: uri
                  pattern: "^https://"
                applyUrl:
                  type: string
                  format: uri
                  pattern: "^https://"
                message:
                  type: string
                  maxLength: 4000
              required:
                - kind
                - contactName
                - contactEmail
                - companyName
                - listingTitle
      responses:
        "200":
          description: Lead accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
        "400":
          description: Invalid JSON or invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: D1 insert failed
        "503":
          description: Site DB not configured
  /api/admin/listing-leads:
    get:
      summary: Review listing leads
      description: Token-protected lead review/export endpoint for manual moderation.
      security:
        - AdminBearer: []
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
            example: "Bearer $LEADS_ADMIN_TOKEN"
        - in: query
          name: kind
          schema:
            type: string
            enum:
              - job
              - tool
        - in: query
          name: status
          schema:
            type: string
            enum:
              - new
              - pending_review
              - approved
              - active
              - rejected
              - expired
              - archived
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Lead review envelope
        "401":
          description: Missing or invalid admin token
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
        "503":
          description: Site DB not configured
    patch:
      summary: Apply a lead status transition
      description: Moves a listing lead through the manual review status transition model.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: integer
                  minimum: 1
                action:
                  type: string
                  enum:
                    - review
                    - approve
                    - activate
                    - reject
                    - expire
                    - archive
              required:
                - id
                - action
      responses:
        "200":
          description: Lead status transition applied
        "400":
          description: Invalid payload or invalid status transition
        "401":
          description: Missing or invalid admin token
        "403":
          description: Forbidden origin
        "404":
          description: Lead not found
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "503":
          description: Site DB not configured
  /api/github-stats:
    get:
      responses:
        "200":
          description: GitHub repository stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  repo:
                    type: string
                    example: "JSONbored/claudepro-directory"
                  stars:
                    type: integer
                    minimum: 0
                    nullable: true
                  forks:
                    type: integer
                    minimum: 0
                    nullable: true
                  updatedAt:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - repo
                  - stars
                  - forks
                  - updatedAt
        "429":
          description: Rate limited
        "500":
          description: Invalid repo configuration
        "502":
          description: Upstream unavailable
