openapi: 3.0.3
info:
  title: HeyClaude API
  version: 1.0.0
servers:
  - url: https://heyclau.de
  - url: https://dev.heyclau.de
components:
  securitySchemes:
    OriginCheck:
      type: apiKey
      in: header
      name: Origin
      description: Public API requests are protected with origin checks and route-level rate limits.
    AdminBearer:
      type: http
      scheme: bearer
      description: Token required for listing lead review and status transitions.
security:
  - OriginCheck: []
paths:
  /api/votes/query:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                keys:
                  type: array
                  maxItems: 1000
                  items:
                    type: string
                    pattern: "^[a-z0-9-]+:[a-z0-9-]+$"
                clientId:
                  type: string
                  minLength: 1
                  maxLength: 128
              required:
                - keys
      responses:
        "200":
          description: Query succeeded
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: Internal error
  /api/votes/toggle:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                key:
                  type: string
                  pattern: "^[a-z0-9-]+:[a-z0-9-]+$"
                clientId:
                  type: string
                  minLength: 8
                  maxLength: 128
                vote:
                  type: boolean
              required:
                - key
                - clientId
                - vote
      responses:
        "200":
          description: Toggle succeeded
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: Internal error
        "503":
          description: Site DB not configured
  /api/newsletter/subscribe:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 320
                source:
                  type: string
                  maxLength: 64
              required:
                - email
      responses:
        "200":
          description: Subscribe accepted
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "502":
          description: Provider error
        "503":
          description: Not configured
  /api/newsletter/webhook:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              properties:
                type:
                  type: string
                data:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Webhook accepted
        "400":
          description: Invalid JSON
        "401":
          description: Invalid signature
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "502":
          description: Notification failed
        "503":
          description: Webhook not configured
  /api/submissions:
    post:
      summary: Create a reviewable content submission issue
      description: Validates schema-aligned UGC fields, applies anti-abuse controls, and creates a GitHub issue for maintainer review. This endpoint never writes content files or publishes registry entries directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string
                  description: Canonical submission field IDs from the generated issue template spec.
                turnstileToken:
                  type: string
                  maxLength: 4096
                honeypot:
                  type: string
                  maxLength: 512
              required:
                - fields
      responses:
        "200":
          description: GitHub issue created, or honeypot discard accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  ok:
                    type: boolean
                  issueUrl:
                    type: string
                    format: uri
                  issueNumber:
                    type: integer
                  category:
                    type: string
                  slug:
                    type: string
                required:
                  - ok
        "400":
          description: Invalid JSON, invalid submission, or Turnstile failure
        "403":
          description: Forbidden origin
        "409":
          description: Duplicate slug
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "502":
          description: GitHub provider error
        "503":
          description: GitHub issue creation not configured
  /api/download:
    get:
      parameters:
        - in: query
          name: asset
          required: true
          schema:
            type: string
            maxLength: 256
            anyOf:
              - pattern: "^/downloads/skills/[a-z0-9-]+\\.zip$"
              - pattern: "^/downloads/mcp/[a-z0-9-]+\\.mcpb$"
      responses:
        "200":
          description: Download served
        "400":
          description: Invalid asset
        "404":
          description: Not found
        "429":
          description: Rate limited
  /api/registry/manifest:
    get:
      summary: Fetch the versioned registry artifact manifest
      responses:
        "200":
          description: Registry manifest
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  schemaVersion:
                    type: integer
                  generatedAt:
                    type: string
                    format: date-time
                  totalEntries:
                    type: integer
                  artifacts:
                    type: object
                    additionalProperties:
                      type: string
                required:
                  - schemaVersion
                  - generatedAt
                  - totalEntries
                  - artifacts
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/categories:
    get:
      summary: Fetch active registry categories
      responses:
        "200":
          description: Category envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  generatedAt:
                    type: string
                    format: date-time
                  count:
                    type: integer
                  entries:
                    type: array
                    maxItems: 16
                    items:
                      type: object
                      additionalProperties: true
                required:
                  - schemaVersion
                  - generatedAt
                  - count
                  - entries
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/search:
    get:
      parameters:
        - in: query
          name: q
          schema:
            type: string
            maxLength: 120
        - in: query
          name: category
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Search succeeded against the compact registry search artifact
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  query:
                    type: string
                  category:
                    type: string
                  count:
                    type: integer
                  results:
                    type: array
                    maxItems: 50
                    items:
                      type: object
                      additionalProperties: true
                required:
                  - schemaVersion
                  - query
                  - category
                  - count
                  - results
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/feed:
    get:
      summary: Fetch the read-only registry feed descriptor
      responses:
        "200":
          description: Registry feed descriptor with API endpoint templates and artifact links
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/diff:
    get:
      summary: Fetch registry changes since a known signature or date
      parameters:
        - in: query
          name: since
          schema:
            type: string
          description: Current registry changelog signature or ISO date.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Static registry diff envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  kind:
                    type: string
                  generatedAt:
                    type: string
                    format: date-time
                  since:
                    type: string
                    nullable: true
                  currentSignature:
                    type: string
                  hasChanges:
                    type: boolean
                  count:
                    type: integer
                  totalAvailable:
                    type: integer
                  entries:
                    type: array
                    maxItems: 500
                    items:
                      type: object
                      additionalProperties: true
                required:
                  - schemaVersion
                  - kind
                  - generatedAt
                  - currentSignature
                  - hasChanges
                  - count
                  - totalAvailable
                  - entries
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
  /api/registry/entries/{category}/{slug}:
    get:
      summary: Fetch one full registry entry
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: path
          name: slug
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Entry detail envelope
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  schemaVersion:
                    type: integer
                  key:
                    type: string
                  entry:
                    type: object
                    additionalProperties: true
                required:
                  - schemaVersion
                  - key
                  - entry
        "403":
          description: Forbidden origin
        "404":
          description: Entry not found
        "429":
          description: Rate limited
  /api/registry/entries/{category}/{slug}/llms:
    get:
      summary: Fetch one per-entry LLM text artifact
      parameters:
        - in: path
          name: category
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - in: path
          name: slug
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "200":
          description: Plain-text LLM export for one entry
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Forbidden origin
        "404":
          description: Entry LLM artifact not found
        "429":
          description: Rate limited
  /api/listing-leads:
    post:
      summary: Create a job or tool listing lead
      description: Stores hiring and tools/apps/services listing inquiries in D1 for manual review and follow-up.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                kind:
                  type: string
                  enum:
                    - job
                    - tool
                    - claim
                tierInterest:
                  type: string
                  enum:
                    - free
                    - standard
                    - featured
                    - sponsored
                contactName:
                  type: string
                  minLength: 1
                  maxLength: 160
                contactEmail:
                  type: string
                  format: email
                  maxLength: 320
                companyName:
                  type: string
                  minLength: 1
                  maxLength: 180
                listingTitle:
                  type: string
                  minLength: 1
                  maxLength: 180
                websiteUrl:
                  type: string
                  format: uri
                  pattern: "^https://"
                applyUrl:
                  type: string
                  format: uri
                  pattern: "^https://"
                message:
                  type: string
                  maxLength: 4000
              required:
                - kind
                - contactName
                - contactEmail
                - companyName
                - listingTitle
      responses:
        "200":
          description: Lead accepted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
        "400":
          description: Invalid JSON or invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
        "500":
          description: D1 insert failed
        "503":
          description: Site DB not configured
  /api/admin/listing-leads:
    get:
      summary: Review listing leads
      description: Token-protected lead review/export endpoint for manual moderation.
      security:
        - AdminBearer: []
      parameters:
        - in: header
          name: Authorization
          schema:
            type: string
            example: "Bearer $LEADS_ADMIN_TOKEN"
        - in: query
          name: kind
          schema:
            type: string
            enum:
              - job
              - tool
              - claim
        - in: query
          name: status
          schema:
            type: string
            enum:
              - new
              - pending_review
              - approved
              - active
              - rejected
              - expired
              - archived
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: format
          schema:
            type: string
            enum:
              - json
              - csv
      responses:
        "200":
          description: Lead review envelope or CSV export
        "401":
          description: Missing or invalid admin token
        "403":
          description: Forbidden origin
        "429":
          description: Rate limited
        "503":
          description: Site DB not configured
    patch:
      summary: Apply a lead status transition
      description: Moves a listing lead through the manual review status transition model.
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: integer
                  minimum: 1
                action:
                  type: string
                  enum:
                    - review
                    - approve
                    - activate
                    - reject
                    - expire
                    - archive
              required:
                - id
                - action
      responses:
        "200":
          description: Lead status transition applied
        "400":
          description: Invalid payload or invalid status transition
        "401":
          description: Missing or invalid admin token
        "403":
          description: Forbidden origin
        "404":
          description: Lead not found
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "503":
          description: Site DB not configured
  /api/community-signals:
    get:
      summary: Fetch aggregate community signals for one entry or tool
      parameters:
        - in: query
          name: targetKind
          required: true
          schema:
            type: string
            enum:
              - entry
              - tool
        - in: query
          name: targetKey
          required: true
          schema:
            type: string
            pattern: "^(entry|tool):[a-z0-9][a-z0-9-]*(/[a-z0-9][a-z0-9-]*)?$"
      responses:
        "200":
          description: Signal counts, or zero counts when SITE_DB is unavailable
        "400":
          description: Invalid query
    post:
      summary: Record or remove a privacy-light community signal
      description: Stores used-this, works-for-me, and reported-broken signals in D1. Responses fail open when SITE_DB is unavailable or D1 insert failed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                targetKind:
                  type: string
                  enum:
                    - entry
                    - tool
                targetKey:
                  type: string
                  pattern: "^(entry|tool):[a-z0-9][a-z0-9-]*(/[a-z0-9][a-z0-9-]*)?$"
                signalType:
                  type: string
                  enum:
                    - used
                    - works
                    - broken
                clientId:
                  type: string
                  minLength: 16
                  maxLength: 96
                active:
                  type: boolean
              required:
                - targetKind
                - targetKey
                - signalType
                - clientId
      responses:
        "200":
          description: Signal accepted, or safely ignored when SITE_DB is unavailable
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
  /api/intent-events:
    post:
      summary: Record privacy-light user intent metrics
      description: Stores copy/open/install/download/vote intent events in D1 when SITE_DB is configured. Fail-open responses avoid breaking user flows.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum:
                    - copy
                    - open
                    - install
                    - download
                    - vote
                entryKey:
                  type: string
                  pattern: "^[a-z0-9-]+:[a-z0-9-]+$"
                sessionId:
                  type: string
                  maxLength: 128
              required:
                - type
      responses:
        "200":
          description: Event accepted or safely ignored when SITE_DB is unavailable
        "400":
          description: Invalid payload
        "403":
          description: Forbidden origin
        "413":
          description: Payload too large
        "415":
          description: Invalid content type
        "429":
          description: Rate limited
  /api/github-stats:
    get:
      responses:
        "200":
          description: GitHub repository stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  repo:
                    type: string
                    example: "JSONbored/claudepro-directory"
                  stars:
                    type: integer
                    minimum: 0
                    nullable: true
                  forks:
                    type: integer
                    minimum: 0
                    nullable: true
                  updatedAt:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - repo
                  - stars
                  - forks
                  - updatedAt
        "429":
          description: Rate limited
        "500":
          description: Invalid repo configuration
        "502":
          description: Upstream unavailable
