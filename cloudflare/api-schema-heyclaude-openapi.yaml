openapi: 3.1.0
info:
  title: HeyClaude API
  version: 1.0.0
  description: Read-only registry, distribution feeds, and tightly scoped dynamic endpoints. Public
    registry publishing is not exposed through the API.
servers:
  - url: https://heyclau.de
  - url: https://dev.heyclau.de
security:
  - OriginCheck: []
components:
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: object
          properties:
            code:
              type: string
              minLength: 1
            message:
              type: string
            details: {}
          required:
            - code
        requestId:
          type: string
      required:
        - ok
        - error
    RegistryTrustSignals:
      type: object
      properties:
        firstPartyEditorial:
          type: boolean
        packageVerified:
          type: boolean
        packageTrust:
          type:
            - string
            - "null"
        packageChecksum:
          type: string
        checksumPresent:
          type: boolean
        sourceUrlCount:
          type: integer
          minimum: 0
        sourceUrls:
          type: array
          items:
            type: string
            format: uri
          maxItems: 8
        sourceStatus:
          anyOf:
            - type: string
              enum:
                - available
                - missing
            - type: string
        lastVerifiedAt:
          type: string
        adapterGenerated:
          type: boolean
        platforms:
          type: array
          items:
            type: string
          maxItems: 12
        supportLevels:
          type: array
          items:
            type: string
          maxItems: 12
  parameters: {}
paths:
  /api/registry/manifest:
    get:
      tags:
        - Registry
      summary: Registry artifact manifest
      responses:
        "200":
          description: Cacheable registry response with ETag support where applicable.
