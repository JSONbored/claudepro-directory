<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Help review HeyClaude submissions</title>
  </head>
  <body style="margin:0;background:#f7f5f1;color:#171717;font-family:Inter,Arial,sans-serif;">
    <main style="margin:0 auto;max-width:640px;padding:32px 20px;">
      <p style="margin:0 0 16px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#6f6a60;">HeyClaude maintainer call</p>
      <section style="border:1px solid #ded8cc;background:#fffefa;border-radius:20px;padding:28px;">
        <h1 style="margin:0;font-size:28px;line-height:1.2;letter-spacing:-.02em;">{{QUEUE_THEME}}</h1>
        <p style="margin:14px 0 0;font-size:15px;line-height:1.7;color:#4f4a42;">{{REVIEW_ASK}}</p>
        <div style="margin-top:24px;padding:18px;border:1px solid #ded8cc;border-radius:16px;background:#f7f5f1;">
          <p style="margin:0 0 8px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6f6a60;">Queue</p>
          <p style="margin:0;font-size:14px;line-height:1.7;color:#4f4a42;">{{QUEUE_SUMMARY}}</p>
          <a href="{{QUEUE_URL}}" style="display:inline-block;margin-top:14px;border-radius:12px;background:#171717;color:#fffefa;padding:11px 16px;text-decoration:none;font-size:14px;font-weight:700;">Open review queue</a>
        </div>
        <p style="margin:24px 0 0;font-size:14px;line-height:1.7;color:#4f4a42;">{{REVIEW_NOTES}}</p>
      </section>
      <p style="margin:18px 0 0;font-size:12px;line-height:1.6;color:#6f6a60;">You are receiving this because you subscribed to HeyClaude. {{RESEND_UNSUBSCRIBE}}</p>
    </main>
  </body>
</html>
