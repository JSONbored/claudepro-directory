# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Repository configuration for Trunk operations
# Base branch for comparisons and incremental checks
repo:
  trunk_branch: main  # Base branch for Trunk comparisons (used for incremental checks)
# Note: cache and parallel are automatically enabled by Trunk (no config needed)
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
    # Custom plugins for knip, madge, ts-prune, ast-grep
    # Plugin is in the same repository at .trunk/plugins/custom/
    # Using 'local' field to reference plugin from local path (uses current branch automatically)
    - id: custom
      local: .trunk/plugins/custom
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    # Lightweight linters for local development (fast, low resource usage)
    - remark-lint@12.0.1
    - markdown-table-prettify@3.7.0
    # markdown-link-check@3.14.2  # DISABLED: Can be slow, runs via git hooks instead
    - sort-package-json@3.6.0
    - stylelint@16.26.1
    - codespell@2.4.1
    # HEAVY LINTERS DISABLED - Run only in CI/CD or via git hooks (see actions section)
    # These are too resource-intensive for continuous local execution
    # - snyk@1.1295.0  # VERY HEAVY - causes multiple processes, runs on pre-commit/pre-push instead
    # - semgrep@1.146.0  # Heavy - runs on pre-commit/pre-push instead
    # - gitleaks@8.30.0  # Redundant (we use Infisical + TruffleHog in actions)
    # - checkov@3.2.495  # Heavy - runs on pre-commit/pre-push instead
    # - osv-scanner@2.3.1  # Heavy - runs on pre-commit/pre-push instead
    # - trufflehog@3.92.4  # Heavy - runs on pre-commit/pre-push instead (we use Infisical primarily)
    - sql-formatter@15.6.12
    - prisma@7.2.0
    - eslint@9.39.2
    - actionlint@1.7.9
    - git-diff-check
    - markdownlint@0.47.0
    - oxipng@10.0.0
    - prettier@3.7.4
    - renovate@42.66.2  # Linter: validates renovate.json and checks for outdated dependencies
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.0
    - taplo@0.10.0
    - yamllint@1.37.1
    # HEAVY LINTERS DISABLED FROM CONTINUOUS EXECUTION - Available for manual triggering only
    # These are too resource-intensive for continuous file watching and cause CPU/memory issues
    # They are still available via Trunk for manual runs: trunk check --filter <linter-name>
    # They also run on pre-commit/pre-push hooks via actions (see actions section)
    # - knip  # Manual: trunk check --filter knip | Git hook: code-quality-pre-push
    # - madge  # Manual: trunk check --filter madge | Git hook: code-quality-pre-push
    # - ts-prune  # Manual: trunk check --filter ts-prune | Git hook: code-quality-pre-push
    # - ast-grep  # Manual: trunk check --filter ast-grep | Git hook: architecture-insights-pre-push
    # - jest  # Manual: trunk check --filter jest | Git hook: tests-pre-commit, tests-pre-push
    # - playwright  # Manual: trunk check --filter playwright | Git hook: visual-tests-pre-push
    # - depcheck  # Manual: trunk check --filter depcheck | Git hook: code-quality-pre-push
    # - skott  # Manual: trunk check --filter skott | Git hook: code-quality-pre-push
    # - source-map-explorer  # Manual: trunk check --filter source-map-explorer | Git hook: bundle-size-pre-push
    # - lighthouse  # Manual: trunk check --filter lighthouse | Git hook: performance-insights-pre-push
    # - knip-design-system  # Manual: trunk check --filter knip-design-system | Git hook: code-quality-pre-push
  # Global path exclusions - prevent processing of build outputs and dependencies
  # These exclusions apply to all linters to prevent unnecessary CPU/memory usage
  exclude:
    - node_modules/**
    - dist/**
    - .next/**
    - build/**
    - coverage/**
    - playwright-report/**
    - "*.log"
    - "*.tsbuildinfo"
    - ".turbo/**"
    - ".cache/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - ".pnpm-store/**"
  # Default file size limit - Trunk skips files larger than this (default: 4MB)
  # Per-linter max_file_size overrides are not currently supported in definitions
  default_max_file_size: 4194304  # 4MB - default, works for most files
  # Blocking thresholds - control which severity levels block commits/pushes
  # Allows gradual rollout of new linters and focus on high-severity issues
  threshold:
    # New/experimental linters - only high severity blocks
    # These are newer tools we're trying out - don't block on low/medium issues
    - linters: [codespell, remark-lint, markdown-table-prettify]
      level: high
    # Heavy security scanners (when enabled) - only high severity blocks
    # These run on git hooks, but if enabled for continuous checks, only block on high
    - linters: [snyk, semgrep, checkov, osv-scanner, trufflehog]
      level: high
    # Code quality tools - medium+ severity blocks
    # NOTE: knip, depcheck, ts-prune are now disabled from continuous execution
    # They run via git hooks only (see code-quality-pre-push action)
    # Threshold configuration kept for reference if re-enabled in future
    # - linters: [knip, depcheck, ts-prune]
    #   level: medium
  # Trigger rules - REMOVED: Heavy linters (knip, depcheck, skott) are now disabled
  # They run via git hooks only (see code-quality-pre-push action) to prevent continuous CPU usage
  # triggers:
  #   # These triggers are no longer needed - linters run via git hooks only
  # Linter definition overrides - customize linter behavior
  definitions:
    # ESLint configuration - optimized for performance and Prettier integration
    - name: eslint
      # ESLint config file location (relative to project root)
      direct_configs:
        - .trunk/configs/eslint.config.mjs
      # Path optimization: Only lint source files, exclude tests and generated files
      # This prevents ESLint from processing test files and build outputs
      include:
        - packages/**/*.{ts,tsx}
        - apps/**/*.{ts,tsx}
        - config/**/*.{ts,tsx,js,jsx}
      exclude:
        - "**/*.test.{ts,tsx}"
        - "**/*.spec.{ts,tsx}"
        - "**/__tests__/**"
        - "**/__mocks__/**"
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
      # Note: sandbox is automatically enabled by Trunk for security
      # Prettier integration: Trunk runs Prettier separately (not via ESLint)
      # This provides better performance and cleaner separation of concerns
      # eslint-config-prettier in ESLint config disables conflicting rules
    # Prettier configuration - runs natively via Trunk (not via ESLint)
    - name: prettier
      # Prettier config file location (relative to project root)
      direct_configs:
        - .prettierrc.json
        - .prettierignore
      # Path optimization: Only format source files, exclude generated files
      # Prettier respects .prettierignore, but explicit excludes prevent unnecessary processing
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
        - "**/*.tsbuildinfo"
        - "**/*.log"
    # Markdown linters - only process markdown files
    - name: markdownlint
      include:
        - "**/*.md"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    - name: remark-lint
      include:
        - "**/*.md"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    - name: markdown-table-prettify
      include:
        - "**/*.md"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    - name: markdown-link-check
      include:
        - "**/*.md"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # YAML linters - only process YAML files
    - name: yamllint
      include:
        - "**/*.{yaml,yml}"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # TOML linter - only process TOML files
    - name: taplo
      include:
        - "**/*.toml"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # Shell linters - only process shell scripts
    - name: shellcheck
      include:
        - "**/*.sh"
        - "**/*.bash"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    - name: shfmt
      include:
        - "**/*.sh"
        - "**/*.bash"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # SQL formatter - only process SQL files
    - name: sql-formatter
      include:
        - "**/*.sql"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # Image optimizers - only process image files
    - name: oxipng
      include:
        - "**/*.png"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    - name: svgo
      include:
        - "**/*.svg"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # Stylelint - only process CSS/SCSS files
    - name: stylelint
      include:
        - "**/*.{css,scss,sass}"
      exclude:
        - node_modules/**
        - dist/**
        - .next/**
        - build/**
        - coverage/**
    # Heavy linters - longer timeout for comprehensive checks
    - name: jest
      run_timeout: 15m  # Tests may take longer, especially with coverage
    - name: playwright
      run_timeout: 20m  # E2E tests take longer than unit tests
    - name: lighthouse
      run_timeout: 10m  # Performance testing takes time
    # Security scanners - longer timeout (when enabled)
    - name: snyk
      run_timeout: 5m  # Security scans can be slow
    - name: semgrep
      run_timeout: 5m
    - name: checkov
      run_timeout: 5m
    # Lightweight linters - shorter timeout for faster failure detection
    - name: codespell
      run_timeout: 2m  # Quick spell check
    - name: sort-package-json
      run_timeout: 1m  # Very fast
    - name: markdown-table-prettify
      run_timeout: 1m
    # Heavy linters removed from definitions - they're disabled from continuous execution
    # These run via git hooks only (see actions section):
    # - jest: Runs via tests-pre-commit and tests-pre-push actions
    # - playwright: Runs via visual-tests-pre-push action
    # - lighthouse: Runs via performance-insights-pre-push action
    # - snyk, semgrep, checkov: Run via security scan actions (pre-commit/pre-push)
    # Note: max_file_size per-linter overrides are not currently supported
    # Use default_max_file_size at lint level if needed (default is 4MB)
    # Per-linter file size limits may be added in future Trunk versions

# ============================================================================
# ACTIONS (Git Hooks and Automation)
# ============================================================================
# Actions are triggered by git hooks (pre-commit, pre-push, post-merge, post-checkout)
# or file changes (on_change triggers)
#
# HEAVY LINTERS - MANUAL TRIGGERING
# All heavy linters are available via Trunk for manual on-demand execution:
#   - trunk check --filter knip              # Unused exports/dependencies
#   - trunk check --filter madge              # Circular dependencies
#   - trunk check --filter ts-prune           # Unused TypeScript exports
#   - trunk check --filter ast-grep           # Architectural pattern checks
#   - trunk check --filter jest               # Unit tests
#   - trunk check --filter playwright         # E2E/visual tests
#   - trunk check --filter depcheck           # Unused dependencies
#   - trunk check --filter skott              # Dependency graph analysis
#   - trunk check --filter source-map-explorer # Bundle size analysis
#   - trunk check --filter lighthouse         # Performance/Core Web Vitals
#   - trunk check --filter knip-design-system # Design system migration check
#
# These linters are DISABLED from continuous execution (not in lint.enabled)
# but are still available via Trunk for manual runs and git hooks.
# Git hooks automatically run these via Trunk on pre-commit/pre-push.
# ============================================================================
actions:
  disabled:
    - trunk-announce
  enabled:
    - trunk-upgrade-available
    # Commit message validation - enforces conventional commits
    # Validates commit messages on pre-commit to ensure consistent format
    # Benefits: Automated changelog generation, better commit history, semantic versioning support
    - commitlint
    # Git blame ignore revs - automatically configures .git-blame-ignore-revs
    # Excludes large formatting/refactoring commits from git blame output
    # Benefits: Cleaner blame history, better attribution of actual code changes
    - git-blame-ignore-revs
    # NPM check - validates package.json dependencies
    # Checks for outdated, incorrect, or unused dependencies
    # Benefits: Keeps dependencies up-to-date, identifies unused packages, reduces security vulnerabilities
    # Note: May need pnpm compatibility testing or custom action for pnpm
    - npm-check
    # Enable Trunk's built-in hooks for linting/formatting (replaces lefthook)
    - trunk-check-pre-push  # Pre-push linting checks (replaces lefthook linting)
    - trunk-fmt-pre-commit  # Pre-commit formatting (replaces lefthook formatting)
    # Custom actions for automatic type checking and generation
    # DISABLED: type-check-on-change - Too expensive, runs on every TS file change
    # Type checking now only runs on pre-commit/pre-push hooks
    # - type-check-on-change
    - prisma-generate-on-change
    # DISABLED: openapi-generate-on-change - Too expensive (runs 3 commands), runs on pre-commit instead
    # OpenAPI generation now runs on pre-commit hook (see openapi-generate-pre-commit action)
    # - openapi-generate-on-change
    - generate-service-worker-on-change
    - generate-readme-on-change
    - sync-db-on-schema-change
    # Blocking pre-commit hooks (migrated from lefthook)
    # Only type-check and secrets-scan are blocking (user requirement)
    - infisical-secrets-scan-pre-commit
    - type-check-pre-commit
    # Blocking pre-push hooks (migrated from lefthook)
    # Only type-check and secrets-scan are blocking (user requirement)
    - infisical-secrets-scan-pre-push
    - type-check-pre-push
    # Non-blocking pre-commit hooks (migrated from lefthook)
    # These provide warnings but don't block commits
    - large-files-pre-commit
    # Non-blocking validation hooks (migrated from lefthook)
    # These validate but don't block (user preference: only type-check and secrets-scan block)
    - prisma-validate-pre-commit
    - db-types-validate-pre-commit
    - generated-files-validate-pre-commit
    - openapi-validate-pre-commit
    # Heavy security scanners - pre-commit (NON-BLOCKING)
    # These run only on commit/push, not continuously (saves resources)
    - snyk-scan-pre-commit
    - semgrep-scan-pre-commit
    - checkov-scan-pre-commit
    - osv-scanner-pre-commit
    - trufflehog-scan-pre-commit
    # Heavy security scanners - pre-push (NON-BLOCKING)
    - snyk-scan-pre-push
    - semgrep-scan-pre-push
    - checkov-scan-pre-push
    - osv-scanner-pre-push
    # OpenAPI generation - pre-commit (NON-BLOCKING)
    # Runs on commit instead of every file change (less expensive)
    - openapi-generate-pre-commit
    # Migrations validation - pre-push (NON-BLOCKING)
    # Validates Prisma migrations (migrated from lefthook)
    - migrations-validate-pre-push
    # Dependencies check - pre-commit (NON-BLOCKING)
    # Validates dependency consistency (migrated from lefthook)
    - dependencies-check-pre-commit
    # MCP schema validation - pre-commit (NON-BLOCKING)
    # Validates MCP worker schemas (migrated from lefthook)
    - mcp-schema-validate-pre-commit
    # Quick insights - pre-commit (NON-BLOCKING)
    # Checks for common code quality issues (migrated from lefthook)
    - quick-insights-pre-commit
    # Tests - pre-commit (NON-BLOCKING)
    # Runs tests on staged files (migrated from lefthook)
    - tests-pre-commit
    # Tests - pre-push (NON-BLOCKING)
    # Runs full test suite before push (migrated from lefthook)
    - tests-pre-push
    # Code quality - pre-push (NON-BLOCKING)
    # Runs code quality checks before push (migrated from lefthook)
    - code-quality-pre-push
    # Optional pre-push hooks (migrated from lefthook)
    # These provide insights but don't block pushes
    - dependency-audit-pre-push
    - bundle-size-pre-push
    - visual-tests-pre-push
    - accessibility-tests-pre-push
    - coverage-check-pre-push
    - architecture-insights-pre-push
    - performance-insights-pre-push
    - visual-regression-pre-push
    # Post-merge/post-checkout hooks (migrated from lefthook)
    # Auto-install dependencies and sync database types
    - deps-install-post-merge
    - db-types-sync-post-merge
    - deps-check-post-checkout
  definitions:
    # DISABLED: TypeScript type checking on file change
    # This was too expensive - runs on every TS file change
    # Type checking now only runs on pre-commit/pre-push hooks (see type-check-pre-commit and type-check-pre-push)
    # - id: type-check-on-change
    #   triggers:
    #     - files: ['**/*.{ts,tsx}']
    #   run: pnpm type-check:build
    #   runtime: node

    # Prisma generate - runs automatically when Prisma schema changes
    # Auto-generates Prisma types when schema.prisma changes
    - id: prisma-generate-on-change
      triggers:
        - files: [prisma/schema.prisma]
      run: pnpm prisma:generate:exec
      runtime: node

    # DISABLED: OpenAPI generation on file change
    # This was too expensive - runs 3 commands on every API route change
    # OpenAPI generation now runs on pre-commit hook instead (see openapi-generate-pre-commit action)
    # - id: openapi-generate-on-change
    #   triggers:
    #     - files:
    #         - '**/*openapi*.{yaml,yml,json}'
    #         - 'packages/generators/src/commands/generate-openapi.ts'
    #         - 'packages/generators/src/commands/generate-mcp-openapi.ts'
    #         - 'packages/generators/src/commands/generate-api-client.ts'
    #         - 'packages/generators/src/commands/generate-mcpb-packages.ts'
    #         - 'apps/web/src/app/api/**/route.ts' # API route changes trigger OpenAPI regen
    #   run: infisical run --env=dev -- pnpm generate:openapi && infisical run --env=dev -- pnpm generate:api-client && infisical run --env=dev -- pnpm build:mcpb
    #   runtime: node

    # Service worker generation - runs automatically when category/security config changes
    # Auto-regenerates service worker when categories or security config changes
    - id: generate-service-worker-on-change
      triggers:
        - files:
            - packages/web-runtime/src/data/config/category.ts
            - packages/shared-runtime/src/schemas/env.ts
            - package.json
      run: pnpm generate:service-worker:exec
      runtime: node

    # README generation - runs automatically when schema or template changes
    # Auto-updates README when database schema or README template changes
    - id: generate-readme-on-change
      triggers:
        - files:
            - prisma/schema.prisma
            - packages/generators/src/utils/readme-builder.ts
            - packages/generators/src/commands/generate-readme.ts
      run: infisical run --env=dev -- pnpm generate:readme:exec
      runtime: node

    # Database sync - runs automatically when schema or migrations change
    # Auto-syncs database when schema.prisma or migrations change
    - id: sync-db-on-schema-change
      triggers:
        - files:
            - prisma/schema.prisma
            - supabase/migrations/**/*.sql
      run: infisical run --env=dev -- pnpm sync:db:exec
      runtime: node

    # ============================================================================
    # BLOCKING PRE-COMMIT HOOKS (migrated from lefthook)
    # These block commits if they fail (security + correctness)
    # ============================================================================

    # Infisical secrets scan - pre-commit (BLOCKING)
    # Scans staged files for secrets using Infisical
    # Blocks commits if secrets are detected (security critical)
    - id: infisical-secrets-scan-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: |
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          exit 0
        fi
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM 2>/dev/null || echo "")
        if [ -z "$STAGED_FILES" ]; then
          exit 0
        fi
        if perl -e 'alarm 30; exec @ARGV' infisical scan git-changes --staged --silent --redact >/dev/null 2>&1; then
          echo "✅ Secrets scan passed"
          exit 0
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo "⏱️  Secrets scan timed out (>30s) - proceeding"
            exit 0
          else
            echo "❌ SECURITY ALERT: Secrets detected in staged files!"
            echo "   💡 Remove secrets and use Infisical env vars instead"
            echo "   🔍 Run: infisical scan git-changes --staged --verbose"
            exit 1
          fi
        fi

    # Type check - pre-commit (BLOCKING)
    # Runs type-check:build on staged TS files
    # Blocks commits if type errors exist (catches errors early)
    - id: type-check-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: |
        STAGED_TS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx)$' || echo "")
        if [ -z "$STAGED_TS" ]; then
          exit 0
        fi
        pnpm type-check:build

    # ============================================================================
    # NON-BLOCKING PRE-COMMIT HOOKS (migrated from lefthook)
    # These provide warnings but don't block commits
    # ============================================================================

    # Large files check - pre-commit (NON-BLOCKING, informational)
    # Checks staged files for size
    # Warns about large files but doesn't block (user preference: only type-check and secrets-scan block)
    - id: large-files-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: |
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM 2>/dev/null || echo "")
        if [ -z "$STAGED_FILES" ]; then
          exit 0
        fi
        LARGE_FILES=""
        for file in $STAGED_FILES; do
          if [ ! -f "$file" ]; then
            continue
          fi
          SIZE=$(stat -f "%z" "$file" 2>/dev/null || stat -c "%s" "$file" 2>/dev/null || echo "0")
          if [ "$SIZE" -gt 10485760 ]; then
            SIZE_MB=$((SIZE / 1048576))
            LARGE_FILES="$LARGE_FILES\n   ⚠️  $file (${SIZE_MB}MB)"
          fi
        done
        if [ -n "$LARGE_FILES" ]; then
          echo "⚠️  Large files detected (>10MB):"
          echo -e "$LARGE_FILES"
          echo "   💡 Consider using Git LFS for large binary files"
        fi
        exit 0  # Non-blocking

    # ============================================================================
    # BLOCKING PRE-PUSH HOOKS (migrated from lefthook)
    # These block pushes if they fail (security + correctness)
    # ============================================================================

    # Infisical secrets scan - pre-push (BLOCKING)
    # Scans all uncommitted changes for secrets using Infisical
    # Blocks pushes if secrets are detected (security critical)
    - id: infisical-secrets-scan-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          echo "   💡 CI/CD will still scan with TruffleHog"
          exit 0
        fi
        if perl -e 'alarm 60; exec @ARGV' infisical scan git-changes --silent --redact 2>&1; then
          echo "✅ Secrets scan passed"
          exit 0
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo "⏱️  Secrets scan timed out (>60s) - proceeding"
            exit 0
          else
            echo "❌ SECURITY ALERT: Secrets detected in uncommitted changes!"
            echo "   💡 Remove secrets and use Infisical env vars instead"
            echo "   🔍 Run: infisical scan git-changes --verbose"
            exit 1
          fi
        fi

    # Type check - pre-push (BLOCKING)
    # Runs type-check:build before push
    # Blocks pushes if type errors exist (catches errors before push)
    - id: type-check-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: pnpm type-check:build

    # ============================================================================
    # HEAVY LINTERS - PRE-COMMIT/PRE-PUSH (NON-BLOCKING)
    # These run heavy security scanners only on commit/push, not continuously
    # ============================================================================

    # Snyk security scan - pre-commit (NON-BLOCKING)
    # Runs Snyk code test on staged files (heavy, but only on commit)
