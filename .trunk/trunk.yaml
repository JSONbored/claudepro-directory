# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
    # Custom plugins for knip, madge, ts-prune, ast-grep
    # TODO: After committing .trunk/plugins/custom/ to GitHub, update the URI below to:
    # uri: https://github.com/YOUR_USERNAME/YOUR_REPO (or the actual GitHub URL)
    # For now using local path - will work once committed to GitHub
    - id: custom
      ref: main
      uri: file://.trunk/plugins/custom
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  enabled:
    - remark-lint@12.0.1
    - markdown-table-prettify@3.7.0
    - markdown-link-check@3.14.2
    - sort-package-json@3.6.0
    - stylelint@16.26.1
    - codespell@2.4.1
    - snyk@1.1295.0
    - semgrep@1.146.0
    - gitleaks@8.30.0
    - sql-formatter@15.6.12
    - prisma@7.2.0
    - eslint@9.39.2
    - actionlint@1.7.9
    - checkov@3.2.495
    - git-diff-check
    - markdownlint@0.47.0
    - osv-scanner@2.3.1
    - oxipng@10.0.0
    - prettier@3.7.4
    - renovate@42.66.2
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.0
    - taplo@0.10.0
    - trufflehog@3.92.4
    - yamllint@1.37.1
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
