    # Quick insights - pre-commit (NON-BLOCKING)
    # Checks for common code quality issues (console.* usage, 'use client' in API routes, missing 'use cache')
    # Migrated from lefthook pre-commit hook
    - id: quick-insights-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: |
        echo "💡 Quick code quality insights..."
        set +e
        
        # Check staged files for common patterns
        STAGED_TS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx)$' || echo "")
        if [ -z "$STAGED_TS" ]; then
          exit 0
        fi
        
        WARNINGS=0
        
        # Check for console.* usage in staged files (excluding test files and dev-only code)
        for file in $STAGED_TS; do
          # Skip test files (console.* is acceptable in tests)
          if echo "$file" | grep -qE "(test|spec)\.(ts|tsx)$"; then
            continue
          fi
          
          # Check if file has console.* without NODE_ENV development check
          if git diff --cached "$file" 2>/dev/null | grep -qE "console\.(log|error|warn|info|debug)"; then
            # Check if it's in dev-only code (has NODE_ENV check on same or adjacent lines)
            if ! git diff --cached "$file" 2>/dev/null | grep -B5 -A5 "console\." | grep -qE "(NODE_ENV.*development|development.*NODE_ENV)"; then
              # Also skip edge-compatible code (proxy.ts uses console for edge compatibility)
              if ! echo "$file" | grep -qE "(proxy|edge)"; then
                echo "   ⚠️  Found console.* usage in $file"
                echo "      💡 Replace with logger.* from @heyclaude/web-runtime/logging/*"
                WARNINGS=$((WARNINGS + 1))
              fi
            fi
          fi
        done
        
        # Check for 'use client' in actual server-only files (API routes only)
        API_ROUTES=$(echo "$STAGED_TS" | grep -E "apps/web/src/app/api/.*route\.(ts|tsx)$" || echo "")
        if [ -n "$API_ROUTES" ]; then
          for file in $API_ROUTES; do
            if git diff --cached "$file" 2>/dev/null | grep -qE "^\+.*['\"]use client['\"]"; then
              echo "   ⚠️  Found 'use client' in API route: $file"
              echo "      💡 Remove 'use client' from API routes (server-only)"
              WARNINGS=$((WARNINGS + 1))
            fi
          done
        fi
        
        # Check for missing 'use cache' in data fetching functions
        DATA_FILES=$(echo "$STAGED_TS" | grep -E "(packages/web-runtime/src/data|apps/web/src/app).*\.ts$" || echo "")
        if [ -n "$DATA_FILES" ]; then
          for file in $DATA_FILES; do
            # Check if file has async function that looks like data fetching but no 'use cache'
            if git diff --cached "$file" 2>/dev/null | grep -qE "^\+.*async function.*get.*\(|^\+.*export async function"; then
              if ! git diff --cached "$file" 2>/dev/null | grep -qE "^\+.*['\"]use cache"; then
                # Check if it's actually a data fetching function (has await supabase or await fetch)
                if git diff --cached "$file" 2>/dev/null | grep -qE "(await.*supabase|await.*fetch|await.*rpc)"; then
                  echo "   💡 Consider adding 'use cache' to data fetching function in $file"
                  echo "      📚 See: .cursor/rules/cache-components-usage.mdc"
                fi
              fi
            fi
          done
        fi
        
        if [ $WARNINGS -eq 0 ]; then
          echo "   ✅ No code quality issues detected"
        fi
        exit 0  # Non-blocking

    # Dependency audit - pre-push (NON-BLOCKING)
    # Checks for dependency vulnerabilities using pnpm audit
    # Migrated from lefthook pre-push hook
    - id: dependency-audit-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        echo "🔍 Checking for dependency vulnerabilities..."
        START=$(date +%s%N)
        set +e
        AUDIT_OUTPUT=$(pnpm audit --audit-level=moderate 2>&1)
        AUDIT_STATUS=$?
        if [ $AUDIT_STATUS -ne 0 ]; then
          echo "   ⚠️  Dependency vulnerabilities detected:"
          echo "$AUDIT_OUTPUT" | grep -E "moderate|high|critical" | head -10
          echo ""
          echo "   💡 Fix with:"
          echo "      pnpm audit --fix"
          echo "      Or update specific packages"
          echo ""
          echo "   📚 Note: CI/CD also runs dependency scanning"
        else
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "   ✅ No moderate+ vulnerabilities found (${DURATION}ms)"
        fi
        exit 0  # Non-blocking

    # Bundle size check - pre-push (NON-BLOCKING)
    # Checks bundle size via Trunk (available for manual: trunk check --filter source-map-explorer)
    - id: bundle-size-pre-push
      triggers:
        - git_hooks: [pre-push]
        - files: ['apps/web/**/*.{ts,tsx,js,jsx}']
      run: |
        echo "📦 Checking bundle size (via Trunk)..."
        if [ ! -d "apps/web/.next" ]; then
          echo "   ℹ️  No build found - skipping bundle size check"
          echo "   💡 Run: pnpm build"
          exit 0
        fi
        # Run source-map-explorer via Trunk (available for manual: trunk check --filter source-map-explorer)
        if perl -e 'alarm 60; exec @ARGV' trunk check --filter source-map-explorer 2>&1 | head -30; then
          echo "   ✅ Bundle size analysis completed"
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo "   ⏱️  Bundle size check timed out (>60s) - proceeding (non-blocking)"
          else
            echo "   ⚠️  Bundle size check found issues (non-blocking - review before merging)"
            echo "   💡 Run manually: trunk check --filter source-map-explorer"
          fi
        fi
        exit 0  # Non-blocking

    # Visual tests - pre-push (NON-BLOCKING)
    # Runs Playwright visual tests via Trunk (available for manual: trunk check --filter playwright)
    - id: visual-tests-pre-push
      triggers:
        - git_hooks: [pre-push]
        - files: ['apps/web/src/app/**/*.{ts,tsx}']
      run: |
        echo "🎭 Running Playwright visual tests via Trunk (non-blocking)..."
        set +e
        SPEC_FILES=$(find apps/web/src/app -name "*.spec.ts" -o -name "*.spec.tsx" 2>/dev/null | head -1)
        if [ -z "$SPEC_FILES" ]; then
          echo "   ℹ️  No Playwright spec files found - skipping"
          exit 0
        fi
        # Run Playwright via Trunk (available for manual: trunk check --filter playwright)
        if perl -e 'alarm 300; exec @ARGV' trunk check --filter playwright 2>&1 | tail -30; then
          echo "   ✅ Playwright tests passed"
        else
          TEST_EXIT=$?
          if [ $TEST_EXIT -eq 124 ]; then
            echo "   ⏱️  Playwright tests timed out (>300s) - proceeding (non-blocking)"
          else
            echo "   ⚠️  Playwright tests failed (non-blocking - fix before merging)"
            echo "   💡 Run manually: trunk check --filter playwright"
          fi
        fi
        exit 0  # Non-blocking

    # Accessibility tests - pre-push (NON-BLOCKING)
    # Checks accessibility (integrated in Playwright tests)
    # Migrated from lefthook pre-push hook
    - id: accessibility-tests-pre-push
      triggers:
        - git_hooks: [pre-push]
        - files: ['apps/web/src/app/**/*.{ts,tsx}']
      run: |
        echo "♿ Running accessibility tests (non-blocking)..."
        set +e
        if ! command -v playwright &> /dev/null && ! npx playwright --version &> /dev/null 2>&1; then
          echo "   ℹ️  Playwright not available - skipping accessibility tests"
          exit 0
        fi
        echo "   💡 Accessibility testing integrated in Playwright tests"
        echo "   💡 Ensure tests use @axe-core/playwright for WCAG compliance"
        exit 0  # Non-blocking

    # Coverage check - pre-push (NON-BLOCKING)
    # Checks test coverage (informational - thresholds enforced in vitest.config.ts)
    # Migrated from lefthook pre-push hook
    - id: coverage-check-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        echo "📊 Checking test coverage (non-blocking)..."
        set +e
        COVERAGE_OUTPUT=$(pnpm test --coverage --run 2>&1 | grep -E "Statements|Functions|Branches|Lines" | tail -4 || echo "")
        if [ -n "$COVERAGE_OUTPUT" ]; then
          echo "$COVERAGE_OUTPUT"
          echo "   💡 Coverage thresholds: 80% lines, 80% functions, 70% branches"
        else
          echo "   ℹ️  Coverage data not available"
        fi
        exit 0  # Non-blocking

    # Architecture insights - pre-push (NON-BLOCKING)
    # Runs ast-grep pattern checks via Trunk (available for manual: trunk check --filter ast-grep)
    - id: architecture-insights-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        echo "🏗️  Architecture pattern insights (via Trunk)..."
        set +e
        # Run ast-grep via Trunk (available for manual: trunk check --filter ast-grep)
        if perl -e 'alarm 120; exec @ARGV' trunk check --filter ast-grep 2>&1 | head -50; then
          echo "   ✅ Architecture insights completed"
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo "   ⏱️  Architecture insights timed out (>120s) - proceeding (non-blocking)"
          else
            echo "   ⚠️  Architecture insights found issues (non-blocking - review before merging)"
            echo "   💡 Run manually: trunk check --filter ast-grep"
          fi
        fi
        exit 0  # Non-blocking

    # Performance insights - pre-push (NON-BLOCKING)
    # Runs Lighthouse performance checks via Trunk (available for manual: trunk check --filter lighthouse)
    - id: performance-insights-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        echo "⚡ Performance insights (via Trunk)..."
        set +e
        # Run Lighthouse via Trunk (available for manual: trunk check --filter lighthouse)
        if perl -e 'alarm 180; exec @ARGV' trunk check --filter lighthouse 2>&1 | head -30; then
          echo "   ✅ Performance insights completed"
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo "   ⏱️  Performance insights timed out (>180s) - proceeding (non-blocking)"
          else
            echo "   ⚠️  Performance insights found issues (non-blocking - review before merging)"
            echo "   💡 Run manually: trunk check --filter lighthouse"
          fi
        fi
        exit 0  # Non-blocking

    # Visual regression - pre-push (NON-BLOCKING)
    # Runs Playwright visual regression tests
    # Migrated from lefthook pre-push hook
    - id: visual-regression-pre-push
      triggers:
        - git_hooks: [pre-push]
        - files: ['apps/web/src/app/**/*.{ts,tsx}']
      run: |
        echo "🖼️  Running visual regression tests (non-blocking)..."
        set +e
        SPEC_FILES=$(find apps/web/src/app -name "*.spec.ts" -o -name "*.spec.tsx" 2>/dev/null | head -1)
        if [ -z "$SPEC_FILES" ]; then
          echo "   ℹ️  No Playwright spec files found - skipping"
          exit 0
        fi
        # Visual regression is part of visual tests
        echo "   💡 Visual regression testing is included in visual tests"
        echo "   💡 Run: pnpm test:visual"
        exit 0  # Non-blocking

    # ============================================================================
    # NON-BLOCKING VALIDATION HOOKS (migrated from lefthook)
    # These validate but don't block (user preference: only type-check and secrets-scan block)
    # ============================================================================

    # Prisma schema validation - pre-commit (NON-BLOCKING)
    # Validates Prisma schema syntax and formatting
    # Provides warnings but doesn't block commits
    - id: prisma-validate-pre-commit
      triggers:
        - git_hooks: [pre-commit]
        - files: [prisma/schema.prisma]
      run: |
        if [ ! -f "prisma/schema.prisma" ]; then
          exit 0
        fi
        if [ -z "$DIRECT_URL" ] && [ -z "$POSTGRES_PRISMA_URL" ]; then
          echo "⚠️  DIRECT_URL/POSTGRES_PRISMA_URL not available - skipping Prisma validation"
          echo "   💡 Run: infisical run --env=dev -- pnpm prisma validate"
          exit 0
        fi
        if ! pnpm prisma validate 2>&1; then
          echo "⚠️  Prisma schema validation failed (non-blocking)"
          echo "   💡 Fix with: pnpm prisma validate"
          exit 0  # Non-blocking
        fi
        echo "✅ Prisma schema is valid"
        exit 0

    # Database types validation - pre-commit (NON-BLOCKING)
    # Checks if Prisma types need regeneration
    # Provides warnings but doesn't block commits
    - id: db-types-validate-pre-commit
      triggers:
        - git_hooks: [pre-commit]
        - files: [prisma/schema.prisma]
      run: |
        if [ ! -f "prisma/schema.prisma" ] || [ ! -d "packages/database-types/src/prisma" ]; then
          exit 0
        fi
        SCHEMA_TIME=$(stat -f "%m" prisma/schema.prisma 2>/dev/null || stat -c "%Y" prisma/schema.prisma 2>/dev/null)
        TYPES_TIME=$(stat -f "%m" packages/database-types/src/prisma/index.ts 2>/dev/null || stat -c "%Y" packages/database-types/src/prisma/index.ts 2>/dev/null)
        if [ -z "$SCHEMA_TIME" ] || [ -z "$TYPES_TIME" ]; then
          exit 0
        fi
        if [ "$SCHEMA_TIME" -gt "$TYPES_TIME" ]; then
          echo "⚠️  Database types are out of sync with schema (non-blocking)"
          echo "   💡 Regenerate with: pnpm prisma:generate:exec"
          exit 0  # Non-blocking
        fi
        exit 0

    # Generated files validation - pre-commit (NON-BLOCKING)
    # Checks if generated files are up-to-date
    # Provides warnings but doesn't block commits (auto-regeneration handles this)
    - id: generated-files-validate-pre-commit
      triggers:
        - git_hooks: [pre-commit]
        - files: [prisma/schema.prisma, openapi.json, package.json]
      run: |
        WARNINGS=0
        # Check service worker
        if [ -f "apps/web/public/service-worker.js" ]; then
          CHANGED_SW_SOURCES=$(git diff --cached --name-only | grep -E "(minify-service-worker|generate-service-worker|category-config)" || echo "")
          if [ -n "$CHANGED_SW_SOURCES" ]; then
            SW_TIME=$(stat -f "%m" apps/web/public/service-worker.js 2>/dev/null || stat -c "%Y" apps/web/public/service-worker.js 2>/dev/null)
            SW_SOURCE_TIME=$(stat -f "%m" packages/generators/src/bin/minify-service-worker.ts 2>/dev/null || stat -c "%Y" packages/generators/src/bin/minify-service-worker.ts 2>/dev/null)
            if [ -n "$SW_TIME" ] && [ -n "$SW_SOURCE_TIME" ] && [ "$SW_SOURCE_TIME" -gt "$SW_TIME" ]; then
              echo "💡 service-worker.js will be auto-regenerated if needed"
              WARNINGS=$((WARNINGS + 1))
            fi
          fi
        fi
        # Check API client
        if [ -f "packages/database-types/src/api-client/client.generated.ts" ]; then
          CHANGED_API=$(git diff --cached --name-only | grep -E "(openapi\.json|apps/web/src/app/api.*route\.ts$)" || echo "")
          if [ -n "$CHANGED_API" ]; then
            API_TIME=$(stat -f "%m" packages/database-types/src/api-client/client.generated.ts 2>/dev/null || stat -c "%Y" packages/database-types/src/api-client/client.generated.ts 2>/dev/null)
            OPENAPI_TIME=$(stat -f "%m" openapi.json 2>/dev/null || stat -c "%Y" openapi.json 2>/dev/null)
            if [ -n "$API_TIME" ] && [ -n "$OPENAPI_TIME" ] && [ "$OPENAPI_TIME" -gt "$API_TIME" ]; then
              echo "💡 API client will be auto-regenerated if needed"
              WARNINGS=$((WARNINGS + 1))
            fi
          fi
        fi
        if [ $WARNINGS -eq 0 ]; then
          echo "✅ Generated files are up-to-date"
        fi
        exit 0  # Non-blocking

    # OpenAPI schema validation - pre-commit (NON-BLOCKING)
    # Validates OpenAPI schema syntax
    # Provides warnings but doesn't block commits
    - id: openapi-validate-pre-commit
      triggers:
        - git_hooks: [pre-commit]
        - files: [openapi.json]
      run: |
        if [ ! -f "openapi.json" ]; then
          exit 0
        fi
        if ! command -v jq >/dev/null 2>&1; then
          echo "⚠️  jq not found - skipping OpenAPI validation"
          exit 0
        fi
        if ! jq empty openapi.json 2>/dev/null; then
          echo "⚠️  openapi.json is not valid JSON (non-blocking)"
          echo "   💡 Fix with: jq . openapi.json"
          exit 0  # Non-blocking
        fi
        if ! jq -e '.openapi' openapi.json >/dev/null 2>&1 || ! jq -e '.info' openapi.json >/dev/null 2>&1 || ! jq -e '.paths' openapi.json >/dev/null 2>&1; then
          echo "⚠️  openapi.json missing required fields (non-blocking)"
          exit 0  # Non-blocking
        fi
        echo "✅ OpenAPI schema is valid"
        exit 0

    # ============================================================================
    # POST-MERGE/POST-CHECKOUT HOOKS (migrated from lefthook)
    # Auto-install dependencies and sync database types
    # ============================================================================

    # Dependencies install - post-merge (NON-BLOCKING)
    # Auto-installs dependencies when package.json or pnpm-lock.yaml changes
    - id: deps-install-post-merge
      triggers:
        - git_hooks: [post-merge]
        - files: [package.json, pnpm-lock.yaml]
      run: |
        if git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD | grep -qE "(package\.json|pnpm-lock\.yaml)"; then
          echo "📦 Dependencies changed. Installing updates..."
          pnpm install
        fi
        exit 0

    # Database types sync - post-merge (NON-BLOCKING)
    # Auto-syncs database types when Prisma schema changes
    - id: db-types-sync-post-merge
      triggers:
        - git_hooks: [post-merge]
        - files: [prisma/schema.prisma]
      run: |
        if git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD | grep -qE "prisma/schema\.prisma"; then
          echo "🔄 Prisma schema changed. Syncing database types..."
          pnpm prisma:generate:exec 2>&1 | tail -10
          echo "   ✅ Database types synced"
        fi
        exit 0

    # Dependencies check - post-checkout (NON-BLOCKING)
    # Checks if dependencies need installation after checkout
    - id: deps-check-post-checkout
      triggers:
        - git_hooks: [post-checkout]
        - files: [package.json, pnpm-lock.yaml]
      run: |
        if git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD | grep -qE "(package\.json|pnpm-lock\.yaml)"; then
          echo "📦 Dependencies may have changed after checkout. Checking..."
          echo "   Installing dependencies..."
          pnpm install
        else
          echo "   ✅ No dependency changes detected"
        fi
        exit 0
