    # Migrations validation - pre-push (NON-BLOCKING)
    # Validates Prisma migrations (schema-only, naming convention)
    # Migrated from lefthook pre-push hook
    - id: migrations-validate-pre-push
      triggers:
        - git_hooks: [pre-push]
      run: |
        echo "🔍 Validating Prisma migrations..."
        set +e
        
        # Check for migration files
        MIGRATION_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep -E "^supabase/migrations/.*\.sql$" || echo "")
        
        if [ -z "$MIGRATION_FILES" ]; then
          echo "   ✅ No migration files changed - skipping validation"
          exit 0
        fi
        
        ERRORS=0
        
        # Check each migration file
        for migration_file in $MIGRATION_FILES; do
          # Check for data in migrations (should be schema-only)
          if grep -qE "^(COPY|INSERT INTO.*VALUES)" "$migration_file" 2>/dev/null; then
            echo "   ❌ Migration $migration_file contains data (should be schema-only)"
            echo "      💡 Remove COPY/INSERT statements - migrations must only contain schema"
            ERRORS=$((ERRORS + 1))
          fi
          
          # Check migration naming convention
          if ! echo "$migration_file" | grep -qE "^supabase/migrations/[0-9]{14}_[a-z0-9_]+\.sql$"; then
            echo "   ⚠️  Migration $migration_file doesn't follow naming convention"
            echo "      💡 Format: supabase/migrations/YYYYMMDDHHMMSS_descriptive_name.sql"
          fi
        done
        
        if [ $ERRORS -gt 0 ]; then
          echo "   ⚠️  Migration validation failed (non-blocking)"
          echo "      📚 Docs: .cursor/rules/supabase-migrations.mdc"
          exit 0  # Non-blocking
        fi
        
        echo "   ✅ All migrations are valid"
        exit 0

    # Dependencies check - pre-commit (NON-BLOCKING)
    # Validates package.json and pnpm-lock.yaml consistency
    # Migrated from lefthook pre-commit hook
    - id: dependencies-check-pre-commit
      triggers:
        - git_hooks: [pre-commit]
      run: |
        echo "🔍 Checking dependency consistency..."
        set +e
        
        # Check if pnpm-lock.yaml is out of sync
        # Use --frozen-lockfile --dry-run to check without modifying
        if ! pnpm install --frozen-lockfile --dry-run >/dev/null 2>&1; then
          # Check if lock file itself was modified (would be staged)
          LOCKFILE_STAGED=$(git diff --cached --name-only | grep -E "pnpm-lock\.yaml" || echo "")
          
          if [ -z "$LOCKFILE_STAGED" ]; then
            # Lock file not staged - might be out of sync
            echo "   ⚠️  pnpm-lock.yaml may be out of sync (non-blocking)"
            echo "      💡 Run: pnpm install"
          else
            # Lock file is staged - likely up-to-date
            echo "   ✅ pnpm-lock.yaml is staged and consistent"
          fi
        else
          echo "   ✅ Dependencies are consistent"
        fi
        exit 0  # Non-blocking

