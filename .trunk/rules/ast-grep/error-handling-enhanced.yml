# Enhanced Error Handling Pattern Rules
#
# GENERALIZED: This file has been generalized for reuse across projects
# Customization: Replace codebase-specific paths and import references as needed
#
# Industry-standard error handling patterns
# Critical for preventing production crashes
# Consolidated: This file consolidates error handling patterns from:
#   - error-boundaries.yml (error boundary rules merged)
#   - error-handling-enhanced.yml (original)

---
# Rule: Detect unhandled promise rejections
id: unhandled-promise-rejection
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: '\w+\([^)]*\)'
    - not:
        inside:
          has:
            regex: 'try.*catch|\.catch\(|await'
message: "Async function call without error handling. Add try/catch or .catch() to handle rejections. Unhandled rejections crash Node.js processes."
severity: error

---
# Rule: Detect critical components without error boundaries
id: missing-error-boundary-critical
language: typescript
files:
  - 'apps/web/src/app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: payment|checkout|auth|login|signup|billing|subscription
    - not:
        has:
          regex: 'error\.tsx|ErrorBoundary'
message: "Critical user flows (payment, auth, billing) must have error boundaries to prevent full app crashes. Create error.tsx file in route directory."
severity: error

---
# Rule: Detect network calls without retry logic
id: missing-retry-logic-network
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        pattern: fetch($URL, $OPTIONS)
    - not:
        has:
          regex: retry|Retry|exponentialBackoff|withRetry
message: "Network calls should include retry logic for transient failures. Use retry library (e.g., 'p-retry') or implement exponential backoff."
severity: warning

---
# Rule: Detect missing error boundaries in server components
id: missing-error-boundary-server
language: typescript
files:
  - 'apps/web/src/app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
      has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - not:
        inside:
          regex: '<ErrorBoundary[^>]*>'
message: "Server components should be wrapped in error boundaries for error handling. Add <ErrorBoundary> wrapper or create error.tsx file"
severity: warning

---
# Rule: Detect missing error logging in error boundaries
id: missing-error-boundary-logging
language: typescript
files:
  - 'apps/web/src/app/**/error.tsx'
rule:
  all:
    - kind: function_declaration
      has:
        regex: 'export default function \w+\(\s*\{\s*error\s*\}:\s*\{\s*error:\s*Error\s*\}\s*\)\s*\{'
    - not:
        has:
          regex: '(logClientErrorBoundary|logger\.error|reqLogger\.error)\('
message: "Error boundaries must log errors. Use logClientErrorBoundary() for client error boundaries (from @heyclaude/web-runtime/logging/client) or logger.error()/reqLogger.error() for server error boundaries (from @heyclaude/web-runtime/logging/server)"
severity: error

---
# Rule: Detect missing error boundaries in client components with async operations
id: missing-error-boundary-client-async
language: typescript
rule:
  all:
    - kind: function_declaration
      has:
        regex: 'export function \w+\([^)]*\)\s*\{'
    - inside:
        has:
          regex: 'use client'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
    - not:
        inside:
          regex: '<ErrorBoundary[^>]*>'
    - not:
        has:
          regex: 'useLoggedAsync\('
message: "Client components with async operations should be wrapped in error boundaries or use useLoggedAsync for error handling. Add <ErrorBoundary> wrapper or use useLoggedAsync hook from @heyclaude/web-runtime/hooks"
severity: warning
