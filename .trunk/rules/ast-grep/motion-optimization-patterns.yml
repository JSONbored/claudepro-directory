# Motion Optimization Pattern Rules
# Enforces proper Motion.dev animation patterns
# Critical for 60fps performance and accessibility
# Note: JSX pattern matching is limited - some rules require custom tooling

---
# Rule: Detect motion imports without useReducedMotion usage
id: missing-reduced-motion-import
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: motion/react|from 'motion'
    - not:
        has:
          regex: useReducedMotion
    - inside:
        has:
          regex: 'use client'
message: "Components using motion should import and use useReducedMotion() to respect user preferences. Add: import { useReducedMotion } from '@heyclaude/web-runtime/hooks/motion'; const shouldReduceMotion = useReducedMotion();"
severity: warning

---
# Rule: Detect motion imports without design system animation utilities
id: missing-design-system-animations
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: motion/react|from 'motion'
    - not:
        has:
          regex: SPRING|STAGGER|MICROINTERACTIONS
message: "Motion components should use design system animation utilities (SPRING, STAGGER, MICROINTERACTIONS) from @heyclaude/web-runtime/design-system for consistency and performance."
severity: warning

# Note: JSX pattern matching for motion components is limited in ast-grep
# Full motion optimization validation requires custom tooling that:
# 1. Parses JSX to detect <motion.*> components
# 2. Validates animate prop uses transform/opacity (not width/height)
# 3. Checks for willChange hints
# 4. Validates useReducedMotion() usage
# This is better handled by ESLint rules or custom validation script
