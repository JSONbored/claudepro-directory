# Request-Scoped Caching Pattern Rules
# Enforces withSmartCache() usage for Prisma queries in service methods
# Prevents duplicate database queries within the same request lifecycle
# See: packages/data-layer/src/utils/request-cache.ts

---
# Rule:
id: prisma-query-missing-smart-cache
language: typescript
files:
  - 'packages/data-layer/src/services/**/*.ts'
rule:
  all:
    - kind: method_definition
    - inside:
        has:
          pattern: 'class $SERVICE extends BasePrismaService'
    - has:
        regex: 'await prisma\.\w+\('
    - has:
        regex: prisma\.(\$queryRawUnsafe|\$queryRaw|findMany|findFirst|findUnique)
    - not:
        has:
          regex: 'withSmartCache\('
    - not:
        has:
          regex: 'this\.callRpc\('
message: "Prisma queries in service methods should use withSmartCache() for request-scoped caching. This prevents duplicate queries within the same request. Wrap: return withSmartCache('query_name', 'methodName', async () => { const result = await prisma.$queryRawUnsafe(...); ... }, args). Import: import { withSmartCache } from '../utils/request-cache.ts';"
severity: error

---
# Rule:
id: smart-cache-missing-method-name
language: typescript
files:
  - 'packages/data-layer/src/services/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        pattern: 'withSmartCache($RPC_NAME, $METHOD_NAME, $CALL, $ARGS)'
    - has:
        regex: 'withSmartCache\([^,]+,\s*[^,)]+\)'
    - not:
        has:
          pattern: 'withSmartCache($RPC_NAME, $METHOD_NAME'
message: "withSmartCache() must include methodName as second parameter for mutation detection. Add: withSmartCache('rpc_name', 'methodName', async () => { ... }, args). The methodName is used to detect mutations (which are not cached)."
severity: error

---
# Rule:
id: smart-cache-incorrect-parameter-order
language: typescript
files:
  - 'packages/data-layer/src/services/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'withSmartCache\('
    - has:
        pattern: 'withSmartCache($PARAM1, $PARAM2, $PARAM3)'
    - not:
        has:
          pattern: 'withSmartCache($RPC_NAME, $METHOD_NAME, async'
message: "withSmartCache() parameter order: (rpcName, methodName, rpcCall, args). Ensure methodName is the second parameter (string), and rpcCall is the third parameter (async function)."
severity: error

---
# Rule:
id: prisma-query-outside-service
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
  - 'apps/web/src/app/**/*.tsx'
rule:
  all:
    - kind: await_expression
    - has:
        regex: 'await prisma\.\w+\('
    - has:
        regex: prisma\.(\$queryRawUnsafe|\$queryRaw|findMany|findFirst|findUnique|create|update|delete|upsert)
    - not:
        inside:
          has:
            regex: 'class.*Service extends BasePrismaService'
message: "Prisma queries should be in service classes extending BasePrismaService, not in data functions or pages. Create a service method and call it from data functions. This ensures proper error handling, logging, and request-scoped caching."
severity: error

---
# Rule:
id: service-read-operation-missing-cache
language: typescript
files:
  - 'packages/data-layer/src/services/**/*.ts'
rule:
  all:
    - kind: method_definition
    - inside:
        has:
          pattern: 'class $SERVICE extends BasePrismaService'
    - has:
        regex: 'await prisma\.(findMany|findFirst|findUnique|\$queryRawUnsafe|\$queryRaw)\('
    - has:
        regex: get|fetch|load|query|find|read|list
    - not:
        has:
          regex: 'withSmartCache\('
    - not:
        has:
          regex: 'this\.callRpc\('
message: "Read operations in service methods should use withSmartCache() for request-scoped caching. This prevents duplicate queries within the same request. Wrap the query in withSmartCache(). Mutations are automatically excluded from caching."
severity: error

---
# Rule:
id: mutation-with-smart-cache-note
language: typescript
files:
  - 'packages/data-layer/src/services/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'withSmartCache\('
    - has:
        regex: create|update|delete|upsert|insert|remove|add|sync
message: "Note: withSmartCache() automatically excludes mutations from caching. Mutations (create, update, delete, etc.) will not be cached even when wrapped in withSmartCache(). This is correct behavior - mutations should not be cached."
severity: info

# Note: withSmartCache() provides request-scoped caching for Prisma queries
# Mutations are automatically excluded from caching (detected by method name)
# Read operations should use withSmartCache() to prevent duplicate queries
# Service methods should wrap Prisma queries in withSmartCache()
