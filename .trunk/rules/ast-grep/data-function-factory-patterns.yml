# Data Function Factory Pattern Rules
# Enforces use of createDataFunction factory for data functions
# Factory eliminates boilerplate: logging, error handling, service instantiation
# See: packages/web-runtime/src/data/cached-data-factory.ts

---
# Rule:
id: data-function-manual-service-instantiation
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function get\w+\([^)]*\)\s*\{'
    - has:
        regex: 'new \w+Service\('
    - has:
        regex: Service
    - not:
        has:
          pattern: 'createDataFunction'
message: 'Data functions should use createDataFunction() factory instead of manually instantiating services. Factory handles logging, error handling, and service instantiation automatically. Use: const cachedFn = createDataFunction<Args, Return>({ serviceKey, methodName, operation, ... }); return await cachedFn(args);'
severity: error

---
# Rule:
id: data-function-direct-getservice
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function get\w+\([^)]*\)\s*\{'
    - has:
        regex: 'getService\('
    - not:
        has:
          pattern: 'createDataFunction'
message: 'Data functions should use createDataFunction() factory instead of calling getService() directly. Factory handles service instantiation, logging, and error handling. Use createDataFunction() factory.'
severity: error

---
# Rule:
id: data-function-manual-error-handling
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function get\w+\([^)]*\)\s*\{'
    - has:
        regex: 'try.*catch'
    - has:
        regex: 'normalizeError|logger\.error'
    - not:
        has:
          pattern: 'createDataFunction'
message: 'Data functions should use createDataFunction() factory for automatic error handling. Factory handles normalizeError() and logging automatically. Use createDataFunction() instead of manual try/catch with normalizeError.'
severity: warning

---
# Rule:
id: data-function-missing-factory
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function get\w+\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\.\w+\([^)]*\)'
    - has:
        regex: Service
    - not:
        has:
          pattern: 'createDataFunction'
    - not:
        inside:
          has:
            regex: '// Wrapper|// Transformer|// Simple helper'
message: 'Data functions calling service methods should use createDataFunction() factory. Factory eliminates boilerplate for logging, error handling, and service instantiation. Use: const cachedFn = createDataFunction<Args, Return>({ serviceKey, methodName, operation, ... });'
severity: error

---
# Rule:
id: data-function-factory-missing-config
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createDataFunction\('
    - not:
        has:
          pattern: 'serviceKey:'
message: "createDataFunction() must include 'serviceKey' property. Add: serviceKey: 'account' (or 'content', 'companies', 'jobs', 'misc', 'newsletter', 'search', 'trending', 'changelog')"
severity: error

---
# Rule:
id: data-function-factory-missing-method-name
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createDataFunction\('
    - has:
        pattern: 'serviceKey:'
    - not:
        has:
          pattern: 'methodName:'
message: "createDataFunction() must include 'methodName' property. Add: methodName: 'serviceMethodName' (the method name on the service class)"
severity: error

---
# Rule:
id: data-function-factory-missing-operation
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createDataFunction\('
    - has:
        pattern: 'serviceKey:'
    - has:
        pattern: 'methodName:'
    - not:
        has:
          pattern: 'operation:'
message: "createDataFunction() must include 'operation' property for logging. Add: operation: 'getDataFunctionName' (the data function name for logging)"
severity: error

---
# Rule:
id: data-function-using-cache-directive
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function \w+\([^)]*\)\s*\{'
    - has:
        regex: 'use cache'
message: "Data functions should NOT use 'use cache' directive. Pages control caching with 'use cache' directive. Data functions are simple async functions. See cached-data-factory.ts for architectural decision. Remove 'use cache' from data function."
severity: error

# Note: Data functions should use createDataFunction() factory for service method calls
# Factory handles: logging, error handling, service instantiation, result transformation
# Simple wrapper functions that transform data from other functions don't need the factory
# Pages control caching with 'use cache' directive, not data functions
