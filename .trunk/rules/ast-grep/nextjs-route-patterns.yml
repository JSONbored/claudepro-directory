# Next.js Route Pattern Rules
# Enforces Next.js route best practices and prevents common mistakes
# Critical for SEO, performance, and proper route handling
# Shareable across Next.js 16+ projects

---
# Rule: Detect missing generateStaticParams for dynamic routes
id: missing-generate-static-params
language: typescript
files:
  - 'app/**/[*]/page.tsx'
  - 'app/**/[*]/[*]/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: params\.(slug|id|category)
    - not:
        has:
          pattern: export.*generateStaticParams
message: "Dynamic routes should include generateStaticParams() for build-time pre-rendering of popular pages. This improves SEO and initial load performance. Add: export async function generateStaticParams() { return [{ slug: '...' }]; }"
severity: warning

---
# Rule: Detect missing error.tsx for routes with data fetching
id: missing-error-tsx-for-route
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
message: "Routes with data fetching should have error.tsx file in the same directory for error boundaries. Create error.tsx with error boundary component to prevent full app crashes. This is especially important for critical user flows (payment, auth, billing)."
severity: warning

---
# Rule: Detect missing loading.tsx for async pages
id: missing-loading-tsx-for-route
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
message: "Async pages should have corresponding loading.tsx file in the same directory for proper loading states. Create loading.tsx with page-specific skeleton component. This improves UX during data fetching and enables progressive rendering."
severity: warning

---
# Rule: Detect missing metadata export for pages
id: missing-metadata-export
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - not:
        has:
          regex: 'export.*metadata|export.*generateMetadata'
message: "Pages should export metadata or generateMetadata() for SEO. Add: export const metadata: Metadata = { ... } or export async function generateMetadata() { ... }. This improves search engine visibility and social sharing."
severity: warning

---
# Rule: Detect missing notFound() calls for 404 handling
id: missing-not-found-call
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
    - has:
        regex: if.*!.*data|if.*data.*===.*null|if.*data.*===.*undefined
    - not:
        has:
          pattern: notFound\(\)
message: "Pages should call notFound() when data is not found to trigger proper 404 response. Add: if (!data) { notFound(); } after data fetching. Import: import { notFound } from 'next/navigation';"
severity: warning

---
# Rule: Detect missing redirect() for redirect scenarios
id: missing-redirect-call
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: redirect|permanentRedirect|temporaryRedirect|moved|deprecated
    - not:
        has:
          regex: 'redirect\(|permanentRedirect\('
message: "Pages with redirect logic should use Next.js redirect() or permanentRedirect() functions. Add: redirect('/new-path') or permanentRedirect('/new-path'). Import: import { redirect, permanentRedirect } from 'next/navigation';"
severity: warning

---
# Rule: Detect incorrect generateStaticParams return type
id: incorrect-generate-static-params-return
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function generateStaticParams\([^)]*\)\s*\{'
    - has:
        pattern: return $ARRAY
    - not:
        has:
          regex: 'return.*\[.*\{.*slug|return.*\[.*\{.*id'
message: "generateStaticParams() must return array of objects with route parameter keys. Example: return [{ slug: 'example' }] for [slug] route, or [{ category: 'agents', slug: 'example' }] for [category]/[slug] route."
severity: error

---
# Rule: Detect generateStaticParams without error handling
id: generate-static-params-without-error-handling
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function generateStaticParams\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
    - not:
        has:
          regex: 'try.*catch|\.catch\('
message: "generateStaticParams() should include error handling. Wrap data fetching in try/catch and return empty array or placeholder on error. This prevents build failures when data is unavailable."
severity: warning

---
# Rule: Detect missing dynamicParams configuration
id: missing-dynamic-params-config
language: typescript
files:
  - 'app/**/[*]/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        pattern: export.*generateStaticParams
    - not:
        has:
          pattern: export.*dynamicParams
message: "Dynamic routes with generateStaticParams() should export dynamicParams configuration. Add: export const dynamicParams = true; (default) to allow dynamic rendering for routes not in generateStaticParams, or false to return 404 for unknown routes."
severity: info

---
# Rule: Detect missing revalidate configuration for ISR
id: missing-revalidate-config
language: typescript
files:
  - 'app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        pattern: export.*generateStaticParams
    - not:
        has:
          pattern: export.*revalidate
message: "Pages with generateStaticParams() should consider exporting revalidate for Incremental Static Regeneration (ISR). Add: export const revalidate = 3600; (in seconds) to enable ISR. This keeps static pages fresh without full rebuilds."
severity: info
