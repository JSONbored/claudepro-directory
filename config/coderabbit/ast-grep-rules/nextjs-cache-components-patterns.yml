# Next.js Cache Components Pattern Rules
# Comprehensive Cache Components usage and best practices
# Shareable across Next.js 16+ projects using Cache Components
# Consolidated from: cache-components-patterns.yml, cache-invalidation-patterns.yml, nextjs-cache-components-patterns.yml

---
# Rule: Detect data fetching functions without 'use cache' directive
id: missing-cache-directive
language: typescript
files:
  - 'packages/web-runtime/src/data/**/*.ts'
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export async function get$DATA($$$) { $$$ }
    - has:
        pattern: await $FETCH($$$)
    - not:
        has:
          pattern: 'use cache'
message: "Data fetching functions should use 'use cache' directive for optimal caching. Add 'use cache' at the start of the function. For user-specific data, use 'use cache: private' instead."
severity: error

---
# Rule: Detect missing 'use cache' directive in server components with async data fetching
id: missing-use-cache-directive-server
language: typescript
files:
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export default async function $COMPONENT($$$) { $$$ }
    - has:
        pattern: await $ASYNC($$$)
    - not:
        has:
          regex: 'use cache'
message: "Server components with async data fetching must use 'use cache' or 'use cache: private' directive. Add directive as first statement in function body."
severity: error

---
# Rule: Detect missing cacheLife() in cached functions
id: missing-cache-life
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: 'use cache'
    - not:
        has:
          pattern: cacheLife
message: "Cached functions must include cacheLife() profile. Add cacheLife('profile-name') or cacheLife({ stale, revalidate, expire }) after 'use cache' directive. Import: import { cacheLife } from 'next/cache';"
severity: error

---
# Rule: Detect missing cacheTag() in cached functions
id: missing-cache-tag
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: 'use cache'
    - has:
        pattern: cacheLife
    - not:
        has:
          pattern: cacheTag
message: "Cached functions must include cacheTag() for cache invalidation. Add cacheTag('resource-type') and cacheTag('resource-type-${id}') after cacheLife(). Import: import { cacheTag } from 'next/cache';"
severity: error

---
# Rule: Detect incorrect cacheLife profile for data type
id: incorrect-cache-life-profile
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        pattern: cacheLife('static')
    - has:
        regex: user|auth|session|profile|account
message: "User-specific or frequently-changing data should not use 'static' cache profile. Use 'userProfile' profile or custom cacheLife({ stale: 60, revalidate: 300, expire: 1800 }) for user data. 'static' is for rarely-changing data only."
severity: warning

---
# Rule: Detect incorrect cache life profile for dynamic data
id: incorrect-cache-life-dynamic-data
language: typescript
files:
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export default async function $COMPONENT($$$) { $$$ }
    - has:
        regex: 'use cache'
    - has:
        regex: cacheLife\(.*static.*\)|cacheLife\(.*stable.*\)|cacheLife\(.*max.*\)
    - has:
        regex: user|account|activity|notification|bookmark|recent|trending|search|session
message: "Dynamic/user-specific data should use shorter cache life profiles ('minutes', 'quarter', 'half'). 'static'/'stable'/'max' are for rarely-changing content. Use: cacheLife('minutes') or cacheLife('quarter')"
severity: warning

---
# Rule: Detect mutations without cache tag invalidation
id: mutation-without-cache-invalidation
language: typescript
files:
  - 'packages/web-runtime/src/actions/**/*.ts'
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: create|update|delete|upsert|insert|remove|add
    - has:
        pattern: await $SERVICE.($METHOD)($$$)
    - not:
        has:
          pattern: revalidateTag
message: "Mutations must invalidate related cache tags. Add revalidateTag('resource-type') and revalidateTag('resource-type-${id}') after mutation. Import: import { revalidateTag } from 'next/cache';"
severity: error

---
# Rule: Detect missing cache invalidation after mutation
id: missing-cache-invalidation-after-mutation
language: typescript
files:
  - 'packages/web-runtime/src/actions/**/*.ts'
  - 'apps/web/src/app/api/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export (async )?function $ACTION($$$) { $$$ }
    - has:
        regex: create|update|delete|upsert|insert|remove|add
    - has:
        pattern: await $SERVICE.($METHOD)($$$)
    - not:
        has:
          pattern: revalidateTag($$$)
message: "Mutations must invalidate related cache tags. Add: revalidateTag('resource-type') and revalidateTag('resource-type-${id}') after mutation. Import revalidateTag from 'next/cache'"
severity: error

---
# Rule: Detect missing hierarchical cache tags
id: missing-hierarchical-cache-tags
language: typescript
files:
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export default async function $COMPONENT($$$) { $$$ }
    - has:
        regex: 'use cache'
    - has:
        pattern: cacheTag('content')
    - has:
        pattern: await params
    - not:
        has:
          regex: cacheTag\(.*content-.*\)
message: "Cache tags should be hierarchical for granular invalidation. Add: cacheTag('content-${category}') and cacheTag('content-${slug}') in addition to cacheTag('content')"
severity: warning

---
# Rule: Detect non-deterministic operations before connection()
id: non-deterministic-before-connection
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: 'use cache'
    - has:
        regex: Date\.now|Math\.random|new Date|process\.hrtime
    - not:
        has:
          pattern: await connection\(\)
message: "Non-deterministic operations (Date.now(), Math.random(), new Date()) in cached functions must be deferred with await connection() before use. Add 'await connection();' at the start of the function before any non-deterministic operations. Import: import { connection } from 'next/server';"
severity: error

---
# Rule: Detect missing connection() in components with non-deterministic operations
id: missing-connection-with-non-deterministic
language: typescript
files:
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export default async function $COMPONENT($$$) { $$$ }
    - has:
        pattern: (Date.now()|Math.random()|new Date()|performance.now()|crypto.randomUUID())($$$)
    - not:
        has:
          pattern: await connection()
message: "Components using non-deterministic operations must call await connection() at the start. Add: await connection() at function start."
severity: error
