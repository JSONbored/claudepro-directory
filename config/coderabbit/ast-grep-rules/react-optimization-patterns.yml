# React Optimization Pattern Rules
# Enforces React performance optimization patterns
# Prevents unnecessary re-renders and optimizes component performance

---
# Rule: Detect missing useMemo for filtered/mapped arrays
id: missing-usememo-array-operations
language: typescript
rule:
  all:
    - kind: variable_declarator
      has:
        pattern: const $VAR = $ARRAY.$METHOD($$$)
    - inside:
        has:
          regex: 'use client'
    - has:
        regex: (\.map\(|\.filter\(|\.reduce\(|\.sort\(|\.flat\(|\.flatMap\()
    - not:
        has:
          pattern: useMemo($$$)
message: "Array operations in components should use useMemo to prevent recalculation. Wrap: const result = useMemo(() => array.map(...), [array])"
severity: warning

---
# Rule: Detect missing useCallback for event handlers
id: missing-usecallback-event-handlers
language: typescript
rule:
  all:
    - kind: variable_declarator
      has:
        pattern: const $HANDLER = ($$$) => { $$$ }
    - inside:
        has:
          regex: 'use client'
    - has:
        pattern: $HANDLER
        inside:
          has:
            regex: (onClick|onChange|onSubmit|onFocus|onBlur|onKeyDown|onKeyUp|onMouseEnter|onMouseLeave)
    - not:
        has:
          pattern: useCallback($$$)
message: "Event handler functions should use useCallback to prevent unnecessary re-renders. Wrap: const handler = useCallback(() => { ... }, [deps])"
severity: warning

---
# Rule: Detect missing React.memo for components receiving props
id: missing-react-memo-props
language: typescript
rule:
  all:
    - kind: function_declaration
      has:
        pattern: export (function|const) $COMPONENT($PROPS) { $$$ }
    - not:
        has:
          pattern: memo($COMPONENT)
message: "Component receiving props should consider React.memo to prevent unnecessary re-renders when props don't change. Wrap: export const Component = React.memo(function Component(props) { ... })"
severity: info

---
# Rule: Detect unnecessary useState type annotation
id: unnecessary-usestate-type-annotation
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: useState<number>|useState<string>|useState<boolean>
message: "Unnecessary useState type annotation. TypeScript can infer type from initial value. Remove type annotation: useState($INIT) instead of useState<$TYPE>($INIT)"
severity: info

---
# Rule: Detect missing dependency in useEffect
id: missing-useeffect-dependency
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        pattern: useEffect($$$, [])
message: "useEffect with empty dependency array may be missing dependencies. Review dependencies array and add all used variables/functions. If intentional, add eslint-disable-next-line react-hooks/exhaustive-deps"
severity: warning

---
# Rule: Detect missing cleanup in useEffect
id: missing-useeffect-cleanup
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        pattern: useEffect($$$, $DEPS)
    - has:
        regex: (addEventListener|setInterval|setTimeout|subscribe|createConnection)
    - not:
        has:
          pattern: return () => { $$$ }
message: "useEffect with subscriptions/timers/event listeners must include cleanup function. Add: return () => { cleanup code }"
severity: error

---
# Rule: Detect missing Suspense for async components
id: missing-suspense-async-component
language: typescript
files:
  - 'app/**/*.tsx'
rule:
  all:
    - kind: function_declaration
      has:
        pattern: export default async function $COMPONENT($$$) { $$$ }
    - has:
        pattern: await $DATA($$$)
    - not:
        inside:
          pattern: <Suspense>$$$</Suspense>
message: "Async components with data fetching should be wrapped in Suspense for better loading UX. Add: <Suspense fallback={<Loading />}>...</Suspense>"
severity: warning

