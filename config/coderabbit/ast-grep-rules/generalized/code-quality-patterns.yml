# Code Quality Pattern Rules
#
# GENERALIZED: This file has been generalized for reuse across projects
# Customization: Replace codebase-specific paths and import references as needed
#
# Industry-standard code quality patterns
# Improves maintainability and prevents technical debt

---
# Rule: Detect TODO/FIXME comments without issue tracking
id: untracked-todo
language: typescript
rule:
  all:
    - kind: comment
    - has:
        regex: 'TODO|FIXME|HACK|XXX|BUG'
    - not:
        has:
          regex: '#[0-9]+|LINE-[0-9]+|GH-[0-9]+|LINEAR-[A-Z0-9]+'
message: 'TODO/FIXME comments should reference issue tracker (e.g., TODO #123, TODO LINEAR-ABC123). Create Linear issue and reference it, or remove if no longer needed.'
severity: info

---
# Rule: Detect direct process.env access without validation
id: unvalidated-env-access
language: typescript
rule:
  all:
    - kind: member_expression
    - has:
        pattern: process.env[$VAR]
    - not:
        inside:
          has:
            regex: 'validateEnv|env\.|requireEnvVar|getEnvObject'
message: 'Direct process.env access without validation. Use validated env object from YOUR_SHARED_RUNTIME_PACKAGE/schemas/env instead. This ensures type safety and runtime validation.'
severity: error

---
# Rule: Detect exported functions without JSDoc
id: missing-jsdoc-public-api
language: typescript
files:
  - 'src/**/*.ts'
  - 'src/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export\s+(async\s+)?function\s+\w+\([^)]*\)\s*\{'
    - not:
        has:
          regex: '/\*\*'
message: 'Public API functions should include JSDoc comments for documentation. Add @param, @returns, @example for better developer experience.'
severity: warning

---
# Rule: Detect deprecated API usage
id: deprecated-api-usage
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'unstable_cache|React\.cache|fetchCached|getCacheTtl|getCacheInvalidateTags'
message: "Deprecated API detected. Use modern alternatives: unstable_cache → 'use cache', React.cache → removed, fetchCached → removed, getCacheTtl → cacheLife()."
severity: error
