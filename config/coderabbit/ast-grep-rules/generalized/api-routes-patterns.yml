# API Routes Pattern Rules
#
# GENERALIZED: This file has been generalized for reuse across projects
# Customization: Replace codebase-specific paths and import references as needed
#
# Enforces API route standards using createApiRoute() factory
# All API routes must use createApiRoute() factory, not raw NextRequest handlers

---
# Rule: Detect API routes not using createApiRoute factory
id: api-route-not-using-factory
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function (GET|POST|PUT|DELETE|PATCH)\([^)]*NextRequest[^)]*\)'
    - not:
        has:
          regex: 'createApiRoute|createCachedApiRoute'
message: "API routes must use createApiRoute() factory. Replace raw NextRequest handler with createApiRoute({ route, operation, method, cors, querySchema/bodySchema, handler }). Import from YOUR_WEB_RUNTIME_PACKAGE/server. Factory handles validation, logging, CORS, and error handling automatically."
severity: error

---
# Rule: Detect missing route property in createApiRoute config
id: missing-route-property-api-factory
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - not:
        has:
          pattern: 'route:'
message: "createApiRoute() must include 'route' property. Add: route: '/api/path' to factory config."
severity: error

---
# Rule: Detect missing operation property in createApiRoute config
id: missing-operation-property-api-factory
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - not:
        has:
          pattern: 'operation:'
message: "createApiRoute() must include 'operation' property for logging. Add: operation: 'OperationName' to factory config."
severity: error

---
# Rule: Detect missing method property in createApiRoute config
id: missing-method-property-api-factory
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - not:
        has:
          pattern: 'method:'
message: "createApiRoute() must include 'method' property. Add: method: 'GET' (or POST, PUT, DELETE, PATCH) to factory config."
severity: error

---
# Rule: Detect missing cors property in createApiRoute config
id: missing-cors-property-api-factory
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - not:
        has:
          pattern: 'cors:'
message: "createApiRoute() must include 'cors' property. Add: cors: 'anon' (public), 'auth' (authenticated), or false (no CORS) to factory config."
severity: error

---
# Rule: Detect missing querySchema for GET requests in createApiRoute
id: missing-query-schema-get-api
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        pattern: 'export const GET = createApiRoute($CONFIG)'
    - has:
        pattern: 'handler: async ({ query'
    - not:
        has:
          pattern: 'querySchema:'
message: "GET requests using query parameters must include querySchema for validation. Add: querySchema: z.object({ ... }) to createApiRoute config. Import Zod schemas from YOUR_WEB_RUNTIME_PACKAGE/server."
severity: error

---
# Rule: Detect missing bodySchema for POST/PUT requests in createApiRoute
id: missing-body-schema-mutation-api
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'export const (POST|PUT|PATCH)\s*=\s*createApiRoute\('
    - has:
        pattern: 'handler: async ({ body'
    - not:
        has:
          pattern: 'bodySchema:'
message: "POST/PUT/PATCH requests must include bodySchema for validation. Add: bodySchema: z.object({ ... }) to createApiRoute config. Import Zod schemas from YOUR_WEB_RUNTIME_PACKAGE/server."
severity: error

---
# Rule: Detect missing requireAuth for protected routes in createApiRoute
id: missing-require-auth-protected-api
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - has:
        regex: cors:\s*['"]auth['"]
    - not:
        has:
          pattern: 'requireAuth:'
message: "API routes with cors: 'auth' should include requireAuth: true for explicit authentication requirement. Add: requireAuth: true to createApiRoute config."
severity: warning

---
# Rule: Detect missing OPTIONS handler for CORS-enabled routes
id: missing-options-handler-api
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'export const (GET|POST|PUT|DELETE|PATCH)\s*=\s*createApiRoute\('
    - has:
        pattern: 'cors:'
    - not:
        has:
          pattern: 'export const OPTIONS'
message: "API routes with CORS enabled should include OPTIONS handler. Add: export const OPTIONS = createApiOptionsHandler('anon'|'auth'). Import from YOUR_WEB_RUNTIME_PACKAGE/server."
severity: warning

---
# Rule: Detect missing OpenAPI metadata in createApiRoute
id: missing-openapi-metadata-api
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'createApiRoute\('
    - not:
        has:
          pattern: 'openapi:'
message: "API routes should include OpenAPI metadata for documentation. Add: openapi: { summary, description, tags, operationId, responses } to createApiRoute config."
severity: info

---
# Rule: Detect raw NextRequest handler usage (should use factory)
id: raw-nextrequest-handler
language: typescript
files:
  - 'app/api/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function (GET|POST|PUT|DELETE|PATCH)\([^)]*NextRequest[^)]*\)'
    - not:
        has:
          regex: 'createApiRoute|createCachedApiRoute'
message: "Raw NextRequest handlers are deprecated. Use createApiRoute() factory instead. Factory handles validation, logging, CORS, and error handling automatically."
severity: error

# Note: All API routes should use createApiRoute() factory
# Factory automatically handles: validation, logging, CORS, error handling
# Raw NextRequest handlers should be migrated to factory pattern

