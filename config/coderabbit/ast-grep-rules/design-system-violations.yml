# Design System Violation Rules
# Enforces Direct Tailwind usage per .cursor/rules/design-system.mdc
# Design system is defined in @theme block in apps/web/src/app/globals.css
# Semantic utility wrappers (marginBottom.*, stack.*, etc.) DO NOT EXIST

---
# Rule: Detect imports of non-existent semantic design system utilities
id: invalid-design-system-import
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: '@heyclaude/web-runtime/design-system'
    - has:
        regex: '(marginBottom|marginTop|stack|cluster|muted|iconSize|radius|hoverBg|padding|paddingX|paddingY|spaceY|spaceX)'
message: "Semantic design system utilities (marginBottom.*, stack.*, cluster.*, etc.) do not exist. Use Direct Tailwind classes instead (mb-4, flex flex-col gap-4, text-muted-foreground). The design system is defined in @theme block in globals.css. See .cursor/rules/design-system.mdc"
severity: error

---
# Rule: Detect old DIMENSIONS constant usage
id: old-dimensions-constant
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: '(DIMENSIONS|ANIMATION_CONSTANTS|UI_CLASSES)'
    - has:
        regex: '@heyclaude/web-runtime/(ui|design-system)'
message: "Old DIMENSIONS/ANIMATION_CONSTANTS/UI_CLASSES constants are deprecated. Use Direct Tailwind classes instead. Design tokens are defined in @theme block in globals.css. See .cursor/rules/design-system.mdc"
severity: error

---
# Rule: Detect inline styles (should use Tailwind classes)
id: inline-styles-detected
language: typescript
files:
  - 'apps/web/src/components/**/*.tsx'
  - 'packages/web-runtime/src/ui/**/*.tsx'
rule:
  all:
    - pattern: 'style={$STYLE}'
    - not:
        inside:
          has:
            pattern: '// Dynamic|// Calculated|// Animation'
message: "Avoid inline styles. Use Tailwind classes instead. Inline styles are only acceptable for dynamic values (colors, dimensions calculated at runtime). For static styling, use Tailwind classes from @theme block."
severity: warning

---
# Rule: Detect hardcoded color values in className (should use Tailwind color utilities)
id: hardcoded-color-in-classname
language: typescript
rule:
  all:
    - pattern: 'className={$CLASSES}'
    - has:
        regex: '(bg-\[#|text-\[#|border-\[#|bg-\[rgb|text-\[rgb|border-\[rgb)'
message: "Hardcoded color values in className should use Tailwind color utilities from @theme block. Use semantic color names (bg-primary, text-muted-foreground, border-border) instead of hardcoded hex/rgb values. Define custom colors in @theme block if needed."
severity: warning

---
# Rule: Detect hardcoded spacing values (should use Tailwind spacing scale)
id: hardcoded-spacing-in-classname
language: typescript
rule:
  all:
    - pattern: 'className={$CLASSES}'
    - has:
        regex: '(mb-\[|mt-\[|p-\[|gap-\[|space-\[|w-\[|h-\[|min-w-\[|min-h-\[|max-w-\[|max-h-\[)'
message: "Hardcoded spacing values should use Tailwind spacing scale from @theme block. Use standard spacing utilities (mb-4, p-6, gap-4) instead of arbitrary values. If custom spacing is needed, add it to @theme block in globals.css."
severity: warning

---
# Rule: Verify design-system imports are only for animation constants
id: design-system-import-verification
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: '@heyclaude/web-runtime/design-system'
    - has:
        regex: '(SPRING|DURATION|STAGGER|MICROINTERACTIONS|ANIMATIONS|SCROLL_ANIMATIONS|LAYOUT_ANIMATIONS|TEXT_ANIMATIONS|VIEWPORT|gradient)'
    - not:
        has:
          regex: '(marginBottom|stack|cluster|muted|iconSize|radius|hoverBg|padding|spaceY)'
message: "Design system package only exports animation constants (SPRING, DURATION, etc.) and gradients. All styling utilities should use Direct Tailwind classes. This import is valid for animation constants only."
severity: info

# Note: Direct Tailwind class usage (mb-4, flex flex-col gap-4, etc.) is CORRECT and should NOT be flagged
# The design system is defined in @theme block in globals.css, and Tailwind automatically generates utilities
# Components should use Direct Tailwind classes, not semantic utility wrappers
