# Type Safety Pattern Rules
# Enforces TypeScript type safety and prevents runtime errors
# Critical for code reliability and maintainability

---
# Rule: Detect any type usage
id: explicit-any-type
language: typescript
rule:
  all:
    - kind: type_annotation
    - has:
        regex: :\s*any\b
message: "Explicit 'any' type usage. Use proper types or 'unknown' with type guards. If necessary, add eslint-disable comment with justification"
severity: warning

---
# Rule: Detect missing return type annotations
id: missing-return-type-annotation
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: export function $FUNC($$$) { $$$ }
    - not:
        has:
          regex: :\s*\w+\s*\{
message: "Exported functions should have explicit return type annotations for better type safety and documentation"
severity: info

---
# Rule: Detect missing parameter type annotations
id: missing-parameter-type-annotation
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        pattern: function $FUNC($PARAM) { $$$ }
    - not:
        has:
          regex: \$PARAM:\s*\w+
message: "Function parameters should have explicit type annotations. Add: function func(param: Type) { ... }"
severity: warning

---
# Rule: Detect non-null assertion
id: non-null-assertion-used
language: typescript
rule:
  all:
    - kind: non_null_expression
    - has:
        pattern: $VALUE!
message: "Non-null assertion (!) used. Consider adding comment explaining why value is guaranteed to be non-null"
severity: warning
