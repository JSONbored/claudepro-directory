# Enhanced Security Pattern Rules
#
# GENERALIZED: This file has been generalized for reuse across projects
# Customization: Replace codebase-specific paths and import references as needed
#
# Comprehensive security best practices from top engineering companies
# Critical for preventing security vulnerabilities
# Consolidated: This file consolidates all security patterns from:
#   - security-patterns.yml (merged)
#   - security-patterns-enhanced.yml (original)

---
# Rule: Detect hardcoded secrets/API keys
id: hardcoded-secrets
language: typescript
rule:
  all:
    - kind: variable_declarator
    - has:
        pattern: 'const $VAR = $VALUE'
    - has:
        regex: api.*key|secret|password|token|api_key
message: "Hardcoded secret detected. Move to environment variables immediately. Never commit secrets to git. Use: process.env['VAR_NAME'] or validated env object."
severity: error

---
# Rule: Detect missing input validation before database queries
id: missing-input-validation
language: typescript
rule:
  all:
    - kind: call_expression
      has:
        regex: prisma\.(\$queryRawUnsafe|\$queryRaw|findMany|findFirst|findUnique|create|update|delete|upsert)
    - not:
        precedes:
          regex: 'z\.object\('
    - not:
        inside:
          has:
            regex: 'createApiRoute|createDataFunction'
message: "Database queries should validate input with Zod schemas before execution. Add input validation using z.object() from zod. API routes using createApiRoute() factory automatically validate via querySchema/bodySchema."
severity: error

---
# Rule: Detect string interpolation in SQL-like queries
id: sql-injection-risk-string-interpolation
language: typescript
rule:
  all:
    - kind: template_string
    - has:
        regex: SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP
    - has:
        regex: \$\{
message: "String interpolation in SQL queries risks SQL injection. Use parameterized queries (RPC functions) instead. Never build SQL queries with string interpolation."
severity: error

---
# Rule: Detect direct user input in URL construction
id: unsafe-url-construction
language: typescript
rule:
  all:
    - kind: new_expression
    - has:
        pattern: 'new URL($INPUT, $BASE)'
    - has:
        regex: user|input|param|query|body
message: "URL construction with user input must be validated/sanitized. Use URL validation or sanitization before constructing URLs"
severity: error

---
# Rule: Detect API routes not using createApiRoute factory (security risk)
id: api-route-not-using-factory-security
language: typescript
files:
  - 'apps/web/src/app/api/**/*.ts'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export async function (GET|POST|PUT|DELETE|PATCH)\([^)]*NextRequest[^)]*\)'
    - not:
        has:
          regex: 'createApiRoute|createCachedApiRoute'
message: "API routes must use createApiRoute() factory for automatic validation, logging, CORS, and error handling. Raw NextRequest handlers are a security risk. Replace with createApiRoute({ route, operation, method, cors, querySchema/bodySchema, requireAuth, handler })."
severity: error

---
# Rule: Detect missing requireAuth in createApiRoute for protected routes
id: missing-require-auth-api-factory
language: typescript
files:
  - 'apps/web/src/app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        pattern: 'createApiRoute($CONFIG)'
    - has:
        regex: cors:\s*['"]auth['"]
    - not:
        has:
          pattern: 'requireAuth:'
message: "API routes with cors: 'auth' should include requireAuth: true for explicit authentication requirement. Add: requireAuth: true to createApiRoute config for protected routes."
severity: error

---
# Rule: Detect missing auth checks in server actions
id: missing-auth-in-server-action
language: typescript
files:
  - '**/actions/**/*.ts'
  - '**/actions/**/*.tsx'
rule:
  all:
    - kind: variable_declarator
      has:
        regex: 'export\s+(const|function)\s+\w+\([^)]*\)\s*\{'
    - not:
        has:
          regex: '(authedAction|optionalAuthAction|rateLimitedAction|actionClient)\('
message: "Server actions must use safe-action middleware (authedAction, optionalAuthAction, rateLimitedAction, or actionClient) for authentication. Import from @heyclaude/web-runtime/actions/safe-action"
severity: error

---
# Rule: Detect PII logging in log context (outside logger.child) without hashing
id: pii-logging-without-hash
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: '(\w+Logger|logger)\.\w+\([^,]+,\s*\{[^}]*\}\)'
    - has:
        regex: (userId|user_id|email|phone|ssn):\s*\$
    - not:
        inside:
          regex: 'logger\.child\(\s*\{[^}]*\}\)'
    - not:
        has:
          regex: '(hashUserId|hashEmail|hashPII)\('
message: "PII (userId, email, etc.) in log context must be hashed. Use hashUserId() or hashEmail() from @heyclaude/shared-runtime/privacy. NOTE: logger.child({ userId }) automatically hashes via redaction - use that pattern instead."
severity: warning

---
# Rule: Detect dangerous eval() or Function() usage
id: dangerous-eval-usage
language: typescript
rule:
  any:
    - kind: call_expression
      has:
        regex: 'eval\('
    - kind: new_expression
      has:
        regex: 'new Function\('
message: "eval() and Function() are dangerous and should be avoided. Use safer alternatives like JSON.parse() or schema validation"
severity: error

---
# Rule: Detect unsanitized user input in dangerouslySetInnerHTML
id: unsafe-inner-html
language: typescript
rule:
  all:
    - pattern: 'dangerouslySetInnerHTML={{ __html: $INPUT }}'
      has:
        regex: user|input|param|query|body
message: "User input in dangerouslySetInnerHTML must be sanitized. Use DOMPurify or similar sanitization library"
severity: error

---
# Rule: Detect missing CORS in createApiRoute config
id: missing-cors-api-factory
language: typescript
files:
  - 'apps/web/src/app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        pattern: 'createApiRoute($CONFIG)'
    - not:
        has:
          pattern: 'cors:'
message: "createApiRoute() must include 'cors' property for CORS handling. Add: cors: 'anon' (public), 'auth' (authenticated), or false (no CORS) to factory config."
severity: error

---
# Rule: Detect missing CSRF protection in mutating API routes
id: missing-csrf-protection-api
language: typescript
files:
  - 'apps/web/src/app/api/**/*.ts'
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'export const (POST|PUT|DELETE|PATCH)\s*=\s*createApiRoute\('
    - not:
        has:
          regex: csrf|CSRF|verifyCSRF
    - not:
        inside:
          has:
            regex: '// CSRF handled by|// Internal API'
message: "Mutating routes (POST/PUT/DELETE) should include CSRF protection. createApiRoute() factory handles CSRF automatically, but verify CSRF is enabled for public-facing mutation endpoints."
severity: warning

# Note: dangerouslySetInnerHTML detection requires JSX parsing
# This is better handled by ESLint rule: react/no-danger
# AST-GREP has limitations with JSX attribute matching
