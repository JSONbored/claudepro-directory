---
# Rule: Detect async cookies without await
id: nextjs-async-cookies-without-await
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: 'cookies\(\)\.get|headers\(\)\.get'
    - not:
        has:
          regex: 'await cookies\(\)|await headers\(\)'
message: "Next.js 16 cookies() and headers() are async. Always await before accessing. Example: const cookies = await cookies(); const token = cookies.get('token');"
severity: error

---
# Rule: Detect missing await for async metadata functions
id: missing-await-async-metadata
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export\s+(async\s+)?function generateMetadata\([^)]*\)\s*\{'
    - has:
        regex: params:\s*Promise<
    - not:
        has:
          pattern: const $RESOLVED = await params
message: "Next.js 16 metadata functions require await for async params. Use: const resolvedParams = await params"
severity: error

---
# Rule: Detect incorrect metadata function signature (should accept Promise params)
id: incorrect-metadata-signature
language: typescript
files:
  - 'apps/web/src/app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export function generateMetadata\([^)]*\)\s*\{'
    - has:
        regex: params:\s+\w+
    - not:
        has:
          regex: params:\s*Promise<
message: "Next.js 16 metadata functions must accept Promise params. Change: params: Type to params: Promise<Type>"
severity: error

---
# Rule: Detect server-only imports in client components
id: nextjs-server-import-in-client
language: typescript
rule:
  all:
    - kind: import_statement
    - has:
        regex: "'server-only'|unstable_cache|headers|cookies|draftMode"
    - inside:
        has:
          regex: "'use client'"
message: "Server-only imports (unstable_cache, headers, cookies, draftMode) cannot be used in client components. Move to server component or use client-safe alternatives. Remove 'use client' or move server code to server component."
severity: error

---
# Rule: Detect browser APIs in server components
id: nextjs-browser-api-in-server
language: typescript
rule:
  all:
    - kind: member_expression
    - has:
        regex: '(window|document|navigator|localStorage|sessionStorage)\.\w+'
    - not:
        inside:
          has:
            regex: "'use client'"
message: "Browser APIs (window, document, navigator, localStorage) cannot be used in server components. Move to client component ('use client') or use typeof window !== 'undefined' check in client component."
severity: error

---
# Rule: Detect React hooks in server components
id: nextjs-hooks-in-server-component
language: typescript
rule:
  all:
    - kind: call_expression
    - has:
        regex: useState|useEffect|useCallback|useMemo|useRef|useContext
    - not:
        inside:
          has:
            regex: "'use client'"
message: "React hooks (useState, useEffect, etc.) cannot be used in server components. Add 'use client' directive at top of file, or move hook logic to client component."
severity: error

---
# Rule: Detect missing Suspense boundary for async components
id: nextjs-missing-suspense
language: typescript
files:
  - 'apps/web/src/app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: 'await\s+\w+\([^)]*\)'
    - not:
        inside:
          has:
            regex: '<Suspense'
message: "Async components with data fetching should be wrapped in Suspense boundaries for proper loading states. Add <Suspense fallback={<Loading />}> around async component, or create loading.tsx file."
severity: warning

