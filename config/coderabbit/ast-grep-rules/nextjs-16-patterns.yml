# Rule: Detect async searchParams without await
id: nextjs-async-searchparams-without-await
language: typescript
files:
  - 'apps/web/src/app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^,]+,\s*searchParams:\s*\w+\)\s*\{'
    - has:
        regex: 'searchParams\.\w+'
    - not:
        has:
          pattern: await searchParams
message: "Next.js 16 searchParams are async. Always await searchParams before accessing properties. Example: const { q } = await searchParams; instead of searchParams.q."
severity: error

