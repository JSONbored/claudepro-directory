# Next.js 16 Pattern Rules
#
# GENERALIZED: This file has been generalized for reuse across projects
# Customization: Replace codebase-specific paths and import references as needed
#
# Comprehensive Next.js 16 best practices and prevents common mistakes
# Shareable across Next.js 16+ projects
# Consolidated from: nextjs-16-async-patterns.yml, nextjs-16-patterns.yml

---
# Rule: Detect async params without await
id: nextjs-async-params-without-await
language: typescript
files:
  - 'apps/web/src/app/**/page.tsx'
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\(params:\s*\w+\)\s*\{'
    - has:
        regex: 'params\.(slug|id|category)'
    - not:
        has:
          pattern: await params
message: "Next.js 16 params are async. Always await params before accessing properties. Example: const { slug } = await params; instead of params.slug. This ensures proper async handling."
severity: error

---
# Rule: Detect missing await for async params in page components
id: missing-await-async-params
language: typescript
rule:
  all:
    - kind: function_declaration
    - has:
        regex: 'export default async function \w+\([^)]*\)\s*\{'
    - has:
        regex: params:\s*Promise<
    - not:
        has:
          pattern: const $RESOLVED = await params
message: "Next.js 16 requires await for async params. Use: const resolvedParams = await params"
severity: error

