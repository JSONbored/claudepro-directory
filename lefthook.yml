# Lefthook Configuration - Claude Pro Directory
# Version: 4.1.0 (Optimized - December 2025)
# Optimized for large codebase: Reduced from 18→5 pre-commit groups, 15→4 pre-push commands
# Added: Infisical secrets scanning as blocking step in pre-commit and pre-push

# ============================================================================
# OUTPUT CONTROL
# ============================================================================
output:
  - execution      # Show what's running
  - execution_out  # Show command output
  - skips         # Show skipped commands
  - failure       # Always show failures

# ============================================================================
# PRE-COMMIT: Fast, parallel, smart grouping
# Secrets scanning and TypeScript type checking block commits
# Linting and tests run but don't block
# ============================================================================
pre-commit:
  parallel: true
  follow: true
  commands:
    # GROUP 0: CRITICAL SECURITY - Secrets scanning (BLOCKING)
    # Must run first and block commits if secrets are detected
    secrets-scan:
      glob: "**/*"
      run: |
        echo "🔒 Scanning for secrets in staged files..."
        START=$(date +%s%N)
        
        # Check if Infisical CLI is available
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          echo "   Install: brew install infisical/get-cli/infisical"
          echo "   Or: https://infisical.com/docs/cli/overview"
          echo "   ⚠️  WARNING: Secrets scanning is disabled without Infisical CLI"
          exit 0
        fi
        
        # Scan staged files for secrets (BLOCKING)
        # --staged: Only scan files in git staging area
        # --exit-code 1: Exit with error code if secrets found (default)
        # --silent: Disable tip/info messages for cleaner output
        # --redact: Redact secrets from output (security best practice)
        if infisical scan git-changes --staged --silent --redact; then
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "✅ Secrets scan passed (${DURATION}ms)"
        else
          echo ""
          echo "❌ SECURITY ALERT: Secrets detected in staged files!"
          echo ""
          echo "🔒 Action Required:"
          echo "   1. Remove hardcoded secrets from your code"
          echo "   2. Use environment variables via Infisical instead"
          echo "   3. For local dev: infisical run --env=dev -- <command>"
          echo "   4. Never commit secrets, API keys, tokens, or passwords"
          echo ""
          echo "💡 Common fixes:"
          echo "   • Replace: const apiKey = 'sk-...'"
          echo "   • With: const apiKey = process.env['API_KEY']"
          echo "   • Or use: infisical run --env=dev -- <command>"
          echo ""
          exit 1
        fi
      fail_text: "❌ SECURITY: Secrets detected in staged files. Remove hardcoded secrets before committing."

    # GROUP 1: Critical blocking checks (TypeScript only)
    critical:
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      run: |
        echo "🚨 Running critical checks..."
        START=$(date +%s%N)
        
        # Type check (only blocking check)
        pnpm type-check:build || exit 1
        
        DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
        echo "✅ Critical checks passed (${DURATION}ms)"
      fail_text: "❌ TypeScript type checking failed. Fix before committing."

    # GROUP 2: Edge functions (non-blocking, isolated, parallel with GROUP 1)
    edge:
      glob: "apps/edge/functions/**/*.ts"
      run: |
        echo "🦕 Checking edge functions (non-blocking)..."
        if command -v deno &> /dev/null; then
          set +e
          OUTPUT=$(pnpm type-check:edge 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -F "packages/edge-runtime/src/utils/email/" >/dev/null; then
              echo "⚠️  Email template type errors ignored (packages/edge-runtime/src/utils/email/**)"
            else
              echo "⚠️  Edge function type-check failed (non-blocking)"
            fi
          fi
          exit 0
        else
          echo "⚠️  Deno not installed - skipping edge function type-check"
          echo "   Install: brew install deno"
          exit 0
        fi
      fail_text: "⚠️  Edge function validation issues (non-blocking)."

    # GROUP 3: Schema validation (runs in parallel with GROUP 1 & 2)
    schemas:
      glob: "apps/edge/supabase/functions/heyclaude-mcp/**/*.ts"
      run: |
        echo "📋 Validating schemas..."
        set +e
        pnpm validate:zod-schemas 2>&1 | tail -5
        pnpm validate:mcp-tools 2>&1 | tail -5
        exit 0
      fail_text: "⚠️  Schema validation issues (review before merging)."

    # GROUP 4: Linting (non-blocking, auto-fixes staged files)
    linting:
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      run: |
        echo "🔧 Running linting (non-blocking)..."
        set +e
        pnpm lint:build --fix 2>&1 | tail -3
        git add -u
        exit 0
      stage_fixed: true
      fail_text: "⚠️  Linting issues found (non-blocking - auto-fixed where possible)."

    # GROUP 5: Tests (non-blocking, runs in parallel)
    tests:
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      run: |
        echo "🧪 Running affected tests..."
        set +e
        pnpm test --run --changed 2>&1 | tail -15
        exit 0
      fail_text: "⚠️  Tests failed (non-blocking - fix before merging)."

    # GROUP 6: Formatting check (non-blocking, informative)
    formatting:
      glob: "**/*.{ts,tsx,js,jsx,json,css,md}"
      exclude:
        - "node_modules/**"
        - ".next/**"
        - "dist/**"
        - "**/*.generated.*"
      run: |
        echo "✨ Checking code formatting..."
        set +e
        # Only check staged files for speed
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx|js|jsx|json|css|md)$' || true)
        if [ -z "$STAGED_FILES" ]; then
          echo "   ℹ️  No formatted files in this commit"
          exit 0
        fi
        FORMAT_ISSUES=$(echo "$STAGED_FILES" | xargs pnpm prettier --check 2>&1 | grep -c "would reformat" || echo "0")
        if [ "$FORMAT_ISSUES" != "0" ]; then
          echo "   💡 $FORMAT_ISSUES staged file(s) need formatting"
          echo "   Run: pnpm format"
        else
          echo "   ✅ Staged files are properly formatted"
        fi
        exit 0
      fail_text: "💡 Formatting suggestions (non-blocking)."

    # GROUP 7: Quick code insights (non-blocking, fast)
    quick-insights:
      glob: "**/*.{ts,tsx}"
      exclude:
        - "node_modules/**"
        - ".next/**"
        - "dist/**"
        - "**/*.generated.*"
      run: |
        echo "💡 Quick code insights..."
        set +e
        
        # Check staged files for common patterns
        STAGED_TS=$(git diff --cached --name-only | grep -E '\.(ts|tsx)$' || true)
        if [ -z "$STAGED_TS" ]; then
          exit 0
        fi
        
        # Check for console.* usage in staged files
        CONSOLE_COUNT=$(git diff --cached | grep -c "console\." || echo "0")
        if [ "$CONSOLE_COUNT" -gt 0 ]; then
          echo "   ⚠️  Found console.* usage in staged files"
          echo "   💡 Replace with logger.* from @heyclaude/web-runtime/logging/*"
        fi
        
        # Check for 'use client' in server-only files
        SERVER_FILES=$(echo "$STAGED_TS" | grep -E "(app/api|actions|server)" || true)
        if [ -n "$SERVER_FILES" ]; then
          CLIENT_DIRECTIVE=$(git diff --cached | grep -c "'use client'" || echo "0")
          if [ "$CLIENT_DIRECTIVE" -gt 0 ]; then
            echo "   ⚠️  Found 'use client' in server-only files"
            echo "   💡 Remove 'use client' from API routes/server actions"
          fi
        fi
        
        # Check for missing 'use cache' in data functions
        DATA_FUNCTIONS=$(git diff --cached | grep -E "export async function get.*\(" | grep -v "'use cache" | wc -l | tr -d ' ')
        if [ "$DATA_FUNCTIONS" -gt 0 ]; then
          echo "   💡 Consider adding 'use cache' to data fetching functions"
        fi
        
        exit 0
      fail_text: "💡 Quick insights (non-blocking)."

# ============================================================================
# PRE-PUSH: Secrets scanning and type checking block, everything else is non-blocking
# Secrets scanning and TypeScript type checking block pushes
# Build, linting, and tests run but don't block
# ============================================================================
pre-push:
  parallel: false
  commands:
    # CRITICAL SECURITY - Secrets scanning (BLOCKING)
    # Must run first and block pushes if secrets are detected
    secrets-scan:
      run: |
        echo "🔒 Scanning for secrets in uncommitted changes..."
        START=$(date +%s%N)
        
        # Check if Infisical CLI is available
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          echo "   Install: brew install infisical/get-cli/infisical"
          echo "   Or: https://infisical.com/docs/cli/overview"
          echo "   ⚠️  WARNING: Secrets scanning is disabled without Infisical CLI"
          echo "   💡 CI/CD will still scan with TruffleHog (see .github/workflows/security.yml)"
          exit 0
        fi
        
        # Scan all uncommitted changes for secrets (BLOCKING)
        # Without --staged: Scans all uncommitted changes (staged + unstaged)
        # --silent: Disable tip/info messages for cleaner output
        # --redact: Redact secrets from output (security best practice)
        if infisical scan git-changes --silent --redact; then
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "✅ Secrets scan passed (${DURATION}ms)"
        else
          echo ""
          echo "❌ SECURITY ALERT: Secrets detected in uncommitted changes!"
          echo ""
          echo "🔒 Action Required:"
          echo "   1. Remove hardcoded secrets from your code"
          echo "   2. Use environment variables via Infisical instead"
          echo "   3. For local dev: infisical run --env=dev -- <command>"
          echo "   4. Never commit secrets, API keys, tokens, or passwords"
          echo ""
          echo "💡 Common fixes:"
          echo "   • Replace: const apiKey = 'sk-...'"
          echo "   • With: const apiKey = process.env['API_KEY']"
          echo "   • Or use: infisical run --env=dev -- <command>"
          echo ""
          echo "🔍 To see detailed findings (without redaction):"
          echo "   infisical scan git-changes --verbose"
          echo ""
          exit 1
        fi
      fail_text: "❌ SECURITY: Secrets detected in uncommitted changes. Remove hardcoded secrets before pushing."

    # Type checking (blocking check)
    type-check:
      run: |
        echo "🔍 Running type checking..."
        START=$(date +%s%N)
        
        echo "  ▶️  TypeScript type checking..."
        pnpm type-check:build || exit 1
        
        DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
        echo "✅ Type checking passed (${DURATION}ms)"
      fail_text: "❌ TypeScript type checking failed. Fix before pushing."

    # Build verification (non-blocking, with better env var handling)
    build:
      run: |
        echo "🏗️  Verifying build (non-blocking)..."
        START=$(date +%s%N)
        
        # Check for missing env vars
        MISSING_VARS=()
        for var in SUPABASE_URL NEXT_PUBLIC_SUPABASE_URL SUPABASE_ANON_KEY; do
          if [ -z "$(eval echo \$$var)" ]; then
            MISSING_VARS+=("$var")
          fi
        done
        
        # Use Infisical for build verification (required for local dev)
        if command -v infisical >/dev/null 2>&1; then
          # Use Infisical for build verification
          set +e
          BUILD_OUTPUT=$(infisical run --env=dev -- pnpm build 2>&1)
          BUILD_STATUS=$?
          echo "$BUILD_OUTPUT" | tail -10
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "   ⚠️  Build failed (non-blocking - fix before merging)"
          else
            DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
            echo "   ✅ Build verified with Infisical (${DURATION}ms)"
          fi
          exit 0
        elif [ ${#MISSING_VARS[@]} -gt 0 ]; then
          echo "⚠️  Missing env vars: ${MISSING_VARS[*]}"
          echo "   ⚠️  Infisical not available - build verification skipped"
          echo "   For local development, install Infisical CLI and run: infisical run --env=dev -- <command>"
          echo "   (CI will verify with proper environment)"
          exit 0
        fi
        
        # Run build (env vars already available from Infisical or .env.local)
        set +e
        BUILD_OUTPUT=$(pnpm build 2>&1)
        BUILD_STATUS=$?
        echo "$BUILD_OUTPUT" | tail -10
        if [ $BUILD_STATUS -ne 0 ]; then
          echo "   ⚠️  Build failed (non-blocking - fix before merging)"
        else
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "   ✅ Build verified (${DURATION}ms)"
        fi
        exit 0
      fail_text: "⚠️  Build failed (non-blocking)."

    # Linting (non-blocking)
    linting:
      run: |
        echo "🔧 Running linting (non-blocking)..."
        set +e
        pnpm lint:build 2>&1 | tail -10
        exit 0
      fail_text: "⚠️  Linting issues found (non-blocking)."

    # Tests (non-blocking)
    tests:
      run: |
        echo "🧪 Running tests (non-blocking)..."
        set +e
        # Check if there are any test files before running
        TEST_FILES=$(find . -name "*.test.ts" -o -name "*.test.tsx" -o -name "*.spec.ts" -o -name "*.spec.tsx" 2>/dev/null | grep -v node_modules | head -1)
        if [ -z "$TEST_FILES" ]; then
          echo "   ℹ️  No test files found - skipping"
          exit 0
        fi
        # Run tests and capture output
        TEST_OUTPUT=$(pnpm test --run 2>&1)
        TEST_STATUS=$?
        echo "$TEST_OUTPUT" | tail -20
        if [ $TEST_STATUS -ne 0 ]; then
          echo "   ⚠️  Tests failed (non-blocking - fix before merging)"
        else
          echo "   ✅ Tests passed"
        fi
        exit 0
      fail_text: "⚠️  Tests failed (non-blocking)."

    # Code quality insights (non-blocking, informative)
    code-quality:
      run: |
        echo "📊 Code quality insights..."
        echo ""
        set +e
        
        # Unused exports check
        echo "🔍 Checking unused exports..."
        UNUSED_OUTPUT=$(npx knip -c config/tools/knip.json --no-exit-code 2>/dev/null | head -20)
        if echo "$UNUSED_OUTPUT" | grep -q "Unused"; then
          UNUSED_COUNT=$(echo "$UNUSED_OUTPUT" | grep -c "Unused" || echo "0")
          echo "   ⚠️  Found ~$UNUSED_COUNT unused export(s)"
          echo "   💡 Run: pnpm analyze:unused"
        else
          echo "   ✅ No unused exports detected"
        fi
        echo ""
        
        # Circular dependencies check
        echo "🔄 Checking circular dependencies..."
        CIRCULAR_OUTPUT=$(npx madge --circular --extensions ts,tsx apps/web/src packages/web-runtime/src packages/data-layer/src 2>/dev/null | head -10)
        if echo "$CIRCULAR_OUTPUT" | grep -q "↻"; then
          CIRCULAR_COUNT=$(echo "$CIRCULAR_OUTPUT" | grep -c "↻" || echo "0")
          echo "   ⚠️  Found ~$CIRCULAR_COUNT circular dependency chain(s)"
          echo "   💡 Run: pnpm analyze:circular"
        else
          echo "   ✅ No circular dependencies detected"
        fi
        echo ""
        
        # Large files check
        echo "📏 Checking for large files..."
        LARGE_FILES=$(find apps/web/src packages/web-runtime/src packages/data-layer/src -name "*.ts" -o -name "*.tsx" 2>/dev/null | xargs wc -l 2>/dev/null | awk '$1 > 500 {print $2 " (" $1 " lines)"}' | head -5)
        if [ -n "$LARGE_FILES" ]; then
          LARGE_COUNT=$(echo "$LARGE_FILES" | wc -l | tr -d ' ')
          echo "   ⚠️  Found $LARGE_COUNT file(s) > 500 LOC:"
          echo "$LARGE_FILES" | sed 's/^/      - /'
          echo "   💡 Consider splitting large files for maintainability"
        else
          echo "   ✅ No overly large files detected"
        fi
        echo ""
        
        echo "✅ Code quality check complete (non-blocking)"
        exit 0
      fail_text: "💡 Code quality insights (non-blocking)."

    # Architecture pattern insights (non-blocking, using ast-grep if available)
    architecture-insights:
      run: |
        echo "🏗️  Architecture pattern insights..."
        set +e
        
        # Check if ast-grep is available
        if command -v ast-grep &> /dev/null || npx ast-grep --version &> /dev/null 2>&1; then
          echo "   🔍 Running ast-grep pattern checks..."
          
          # Logging patterns
          echo "   📝 Logging patterns..."
          CONSOLE_USAGE=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/logging-patterns.yml 2>/dev/null | grep -c "no-console-usage\|missing-normalize-error" || echo "0")
          if [ "$CONSOLE_USAGE" != "0" ]; then
            echo "      ⚠️  Found logging pattern issues (console.* usage, missing normalizeError)"
            echo "      💡 Use logger.* from @heyclaude/web-runtime/logging/*"
          fi
          
          # Security patterns
          echo "   🔒 Security patterns..."
          SECURITY_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/security-patterns.yml 2>/dev/null | grep -c "missing-input-validation\|missing-auth" || echo "0")
          if [ "$SECURITY_ISSUES" != "0" ]; then
            echo "      ⚠️  Found potential security issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/security-patterns.yml"
          fi
          
          # Performance patterns
          echo "   ⚡ Performance patterns..."
          PERF_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/performance-patterns.yml 2>/dev/null | grep -c "n-plus-one\|await-in-loop\|missing-usememo\|missing-usecallback" || echo "0")
          if [ "$PERF_ISSUES" != "0" ]; then
            echo "      ⚠️  Found performance optimization opportunities"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/performance-patterns.yml"
          fi
          
          # Database optimization patterns
          echo "   🗄️  Database optimization patterns..."
          DB_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/database-optimization-patterns.yml 2>/dev/null | grep -c "missing-request-scoped-cache\|missing-cache-life\|missing-cache-tag\|missing-rpc-error" || echo "0")
          if [ "$DB_ISSUES" != "0" ]; then
            echo "      ⚠️  Found database optimization opportunities"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/database-optimization-patterns.yml"
          fi
          
          # React optimization patterns
          echo "   ⚛️  React optimization patterns..."
          REACT_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/react-optimization-patterns.yml 2>/dev/null | grep -c "missing-usememo\|missing-usecallback\|missing-useeffect" || echo "0")
          if [ "$REACT_ISSUES" != "0" ]; then
            echo "      ⚠️  Found React optimization opportunities"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/react-optimization-patterns.yml"
          fi
          
          # Bundle optimization patterns
          echo "   📦 Bundle optimization patterns..."
          BUNDLE_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/bundle-optimization-patterns.yml 2>/dev/null | grep -c "missing-dynamic-import\|inefficient-barrel\|missing-code-splitting" || echo "0")
          if [ "$BUNDLE_ISSUES" != "0" ]; then
            echo "      ⚠️  Found bundle optimization opportunities"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/bundle-optimization-patterns.yml"
          fi
          
          # Accessibility patterns
          echo "   ♿ Accessibility patterns..."
          A11Y_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/accessibility-patterns.yml 2>/dev/null | grep -c "missing-aria-label\|missing-alt-text\|missing-keyboard-handler" || echo "0")
          if [ "$A11Y_ISSUES" != "0" ]; then
            echo "      ⚠️  Found accessibility issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/accessibility-patterns.yml"
          fi
          
          # Type safety patterns
          echo "   🔷 Type safety patterns..."
          TYPE_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/type-safety-patterns.yml 2>/dev/null | grep -c "unsafe-as-assertion\|explicit-any\|missing-type-guard" || echo "0")
          if [ "$TYPE_ISSUES" != "0" ]; then
            echo "      ⚠️  Found type safety issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/type-safety-patterns.yml"
          fi
          
          # Prisma migration patterns (CRITICAL - active migration)
          echo "   🔄 Prisma migration patterns..."
          PRISMA_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/prisma-migration-patterns.yml 2>/dev/null | grep -c "supabase-database-types\|generated-file-import\|missing-prisma-type" || echo "0")
          if [ "$PRISMA_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Prisma migration issues (CRITICAL - active migration)"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/prisma-migration-patterns.yml"
          fi
          
          # Cache invalidation patterns
          echo "   🗄️  Cache invalidation patterns..."
          CACHE_INVALID_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/cache-invalidation-patterns.yml 2>/dev/null | grep -c "missing-cache-invalidation\|incorrect-cache-life\|missing-hierarchical" || echo "0")
          if [ "$CACHE_INVALID_ISSUES" != "0" ]; then
            echo "      ⚠️  Found cache invalidation issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/cache-invalidation-patterns.yml"
          fi
          
          # Skeleton structure patterns
          echo "   💀 Skeleton structure patterns..."
          SKELETON_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/skeleton-structure-patterns.yml 2>/dev/null | grep -c "missing-loading-file" || echo "0")
          if [ "$SKELETON_ISSUES" != "0" ]; then
            echo "      ⚠️  Found skeleton/page structure issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/skeleton-structure-patterns.yml"
          fi
          
          # Enhanced logging patterns
          echo "   📝 Enhanced logging patterns..."
          LOGGING_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/logging-patterns-enhanced.yml 2>/dev/null | grep -c "missing-request-scoped-logger\|missing-request-id\|request-id-before-connection" || echo "0")
          if [ "$LOGGING_ISSUES" != "0" ]; then
            echo "      ⚠️  Found logging pattern issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/logging-patterns-enhanced.yml"
          fi
          
          # React hooks patterns
          echo "   ⚛️  React hooks patterns..."
          HOOKS_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/react-hooks-patterns.yml 2>/dev/null | grep -c "conditional-hook-call\|missing-cleanup-custom-hook\|custom-hook-naming" || echo "0")
          if [ "$HOOKS_ISSUES" != "0" ]; then
            echo "      ⚠️  Found React hooks issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/react-hooks-patterns.yml"
          fi
          
          # Motion optimization patterns
          echo "   🎬 Motion optimization patterns..."
          MOTION_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/motion-optimization-patterns.yml 2>/dev/null | grep -c "missing-reduced-motion\|missing-design-system-animations" || echo "0")
          if [ "$MOTION_ISSUES" != "0" ]; then
            echo "      ⚠️  Found motion optimization issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/motion-optimization-patterns.yml"
          fi
          
          # Industry-standard security patterns
          echo "   🔒 Enhanced security patterns..."
          SECURITY_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/security-patterns-enhanced.yml 2>/dev/null | grep -c "hardcoded-secrets\|sql-injection\|missing-csrf" || echo "0")
          if [ "$SECURITY_ISSUES" != "0" ]; then
            echo "      ⚠️  Found security issues (CRITICAL)"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/security-patterns-enhanced.yml"
          fi
          
          # Enhanced error handling patterns
          echo "   ⚠️  Enhanced error handling patterns..."
          ERROR_HANDLING_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/error-handling-enhanced.yml 2>/dev/null | grep -c "unhandled-promise\|missing-error-boundary\|missing-retry" || echo "0")
          if [ "$ERROR_HANDLING_ISSUES" != "0" ]; then
            echo "      ⚠️  Found error handling issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/error-handling-enhanced.yml"
          fi
          
          # Code quality patterns
          echo "   📋 Code quality patterns..."
          CODE_QUALITY_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/code-quality-patterns.yml 2>/dev/null | grep -c "untracked-todo\|unvalidated-env\|missing-jsdoc\|deprecated-api" || echo "0")
          if [ "$CODE_QUALITY_ISSUES" != "0" ]; then
            echo "      ⚠️  Found code quality issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/code-quality-patterns.yml"
          fi
          
          # Performance patterns (enhanced rules merged into performance-patterns.yml)
          echo "   ⚡ Performance patterns..."
          PERF_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/performance-patterns.yml 2>/dev/null | grep -c "memory-leak\|large-bundle\|n-plus-one" || echo "0")
          if [ "$PERF_ISSUES" != "0" ]; then
            echo "      ⚠️  Found performance issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/performance-patterns.yml"
          fi
          
          # Tool-specific patterns (Pino, Next.js, Prisma, React, Zod)
          echo "   🔧 Tool-specific best practices..."
          PINO_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/pino-logging-patterns.yml 2>/dev/null | grep -c "direct-pino\|console-usage\|missing-error-normalization" || echo "0")
          if [ "$PINO_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Pino logging issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/pino-logging-patterns.yml"
          fi
          
          CACHE_COMPONENTS_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/cache-components-patterns.yml 2>/dev/null | grep -c "missing-cache\|missing-cache-life\|missing-cache-tag" || echo "0")
          if [ "$CACHE_COMPONENTS_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Cache Components issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/cache-components-patterns.yml"
          fi
          
          PRISMA_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/prisma-best-practices.yml 2>/dev/null | grep -c "n-plus-one\|missing-transaction\|missing-where" || echo "0")
          if [ "$PRISMA_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Prisma best practice issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/prisma-best-practices.yml"
          fi
          
          REACT_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/react-hooks-best-practices.yml 2>/dev/null | grep -c "conditional-hook\|missing-cleanup\|hook-in-nested" || echo "0")
          if [ "$REACT_ISSUES" != "0" ]; then
            echo "      ⚠️  Found React hooks issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/react-hooks-best-practices.yml"
          fi
          
          ZOD_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/zod-validation-patterns.yml 2>/dev/null | grep -c "missing-zod\|missing-descriptions\|missing-constraints" || echo "0")
          if [ "$ZOD_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Zod validation issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/zod-validation-patterns.yml"
          fi
          
          NEXTJS16_ISSUES=$(npx ast-grep scan --rule config/coderabbit/ast-grep-rules/nextjs-16-patterns.yml 2>/dev/null | grep -c "async-params\|async-searchparams\|server-import" || echo "0")
          if [ "$NEXTJS16_ISSUES" != "0" ]; then
            echo "      ⚠️  Found Next.js 16 pattern issues"
            echo "      💡 Review: config/coderabbit/ast-grep-rules/nextjs-16-patterns.yml"
          fi
          
          echo ""
          echo "   ✅ Architecture pattern check complete"
        else
          echo "   ℹ️  ast-grep not available (install: npm i -g @ast-grep/cli)"
          echo "   💡 Install for deeper architecture pattern analysis"
        fi
        
        exit 0
      fail_text: "💡 Architecture insights (non-blocking)."

    # Performance insights (non-blocking)
    performance-insights:
      run: |
        echo "⚡ Performance insights..."
        set +e
        
        # Check for large bundle indicators in recent changes
        echo "   📦 Checking bundle size indicators..."
        
        # Get changed files from current branch vs origin/main
        CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null | grep -E '\.(ts|tsx)$' | head -20 || echo "")
        
        if [ -n "$CHANGED_FILES" ]; then
          # Count dynamic imports (good for code splitting)
          DYNAMIC_COUNT=$(echo "$CHANGED_FILES" | xargs grep -l "await import\|import(" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$DYNAMIC_COUNT" -gt 0 ]; then
            echo "   ✅ Found dynamic imports in changed files (good for code splitting)"
          fi
          
          # Check for 'use cache' directives
          CACHE_COUNT=$(echo "$CHANGED_FILES" | xargs grep -l "'use cache" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$CACHE_COUNT" -gt 0 ]; then
            echo "   ✅ Found Cache Components directives in changed files"
          fi
          
          # Check for missing cache directives in data functions
          DATA_FUNCTIONS=$(echo "$CHANGED_FILES" | xargs grep -l "export async function get.*(" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$DATA_FUNCTIONS" -gt 0 ]; then
            echo "   💡 Consider adding 'use cache' to data fetching functions"
          fi
        else
          echo "   ℹ️  No changed files to analyze (or origin/main not available)"
        fi
        
        echo "   ✅ Performance check complete"
        exit 0
      fail_text: "💡 Performance insights (non-blocking)."

    # Summary & actionable insights (non-blocking)
    summary:
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📋 Pre-push Summary & Quick Actions"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Secrets scanning: PASSED (blocking check)"
        echo "✅ Type checking: PASSED (blocking check)"
        echo ""
        echo "💡 Quick Actions (if needed):"
        echo "   • Format code:        pnpm format"
        echo "   • Fix linting:        pnpm lint:build:fix"
        echo "   • Analyze unused:     pnpm analyze:unused"
        echo "   • Check circular:    pnpm analyze:circular"
        echo "   • Run tests:          pnpm test"
        echo "   • Visual tests:        pnpm test:visual"
        echo "   • Scan for secrets:   infisical scan git-changes --verbose"
        echo ""
        echo "📚 Documentation:"
        echo "   • Logging standards:  .cursor/rules/logging-instrumentation.mdc"
        echo "   • API standards:      .cursor/rules/api-design-standards.mdc"
        echo "   • Security:           .cursor/rules/security-standards.mdc"
        echo ""
        echo "🔧 Tools:"
        echo "   • ESLint config:      config/tools/eslint.config.mjs"
        echo "   • ast-grep rules:     config/coderabbit/ast-grep-rules/"
        echo "   • Knip config:        config/tools/knip.json"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        exit 0
