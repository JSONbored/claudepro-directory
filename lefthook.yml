# Lefthook Configuration - Claude Pro Directory
# Version: 5.0.0 (Fully Optimized - December 2025)
# Optimizations:
# - Secrets scanning: Scans ALL files including generated (security critical)
# - Type checking: Full type-check:build blocks both commits and pushes
# - Faster secrets scanning (timeout, only staged files)
# - Pre-commit: Blocking secrets scan + type-check:build
# - Pre-push: Full blocking checks (secrets + type-check:build)
# - Better parallelization and early exits
# - Scripts directory: config/lefthook/ for reusable validation scripts
# - Tags: Conditional execution for flexible workflows
# - Prisma validation: Schema and migration validation
# - Smart file filtering: Skip checks when not needed
# - Incremental checks: Leverage Turbo cache effectively
# - Database type validation: Ensure types are up-to-date
# - Generated files validation: Prevent stale generated files
# - OpenAPI validation: Ensure API schema is valid
# - Dependency vulnerability scanning: Security enhancement
# - Bundle size analysis: Performance monitoring
# - Enhanced error messages: Better developer experience
# - Summary reports: Clear execution feedback

# ============================================================================
# OUTPUT CONTROL
# ============================================================================
output:
  - execution      # Show what's running
  - execution_out  # Show command output
  - skips         # Show skipped commands
  - failure       # Always show failures

# ============================================================================
# PRE-COMMIT: Fast, parallel, smart grouping
# Secrets scanning and type-check:build block commits (security + correctness)
# Linting and tests run but don't block
# ============================================================================
pre-commit:
  parallel: true
  follow: true
  commands:
    # GROUP 0: CRITICAL SECURITY - Secrets scanning (BLOCKING)
    # Must run first and block commits if secrets are detected
    # Scans ALL staged files including generated files (security critical)
    # Optimized: Only scans staged files, 30s timeout to prevent hanging
    secrets-scan:
      tags: [security, critical, blocking]
      glob: "**/*" # Scans everything including generated files - security critical
      run: |
        echo "🔒 Scanning for secrets in staged files..."
        START=$(date +%s%N)
        
        # Check if Infisical CLI is available
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          echo "   Install: brew install infisical/get-cli/infisical"
          echo "   Or: https://infisical.com/docs/cli/overview"
          echo "   ⚠️  WARNING: Secrets scanning is disabled without Infisical CLI"
          exit 0
        fi
        
        # Get staged files to check if we have anything to scan
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM 2>/dev/null || echo "")
        if [ -z "$STAGED_FILES" ]; then
          echo "   ℹ️  No staged files to scan"
          exit 0
        fi
        
        # Count staged files for progress indication
        STAGED_COUNT=$(echo "$STAGED_FILES" | wc -l | tr -d ' ')
        echo "   📋 Scanning $STAGED_COUNT staged file(s)..."
        
        # Scan staged files for secrets (BLOCKING)
        # --staged: Only scan files in git staging area (faster)
        # --silent: Disable tip/info messages for cleaner output
        # --redact: Redact secrets from output (security best practice)
        # Timeout: 30 seconds max (prevents hanging on large files)
        if timeout 30s infisical scan git-changes --staged --silent --redact 2>&1; then
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "✅ Secrets scan passed (${DURATION}ms)"
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo ""
            echo "⏱️  Secrets scan timed out (>30s)"
            echo "   💡 This usually means large files or many changes"
            echo "   💡 Run manually: infisical scan git-changes --staged --verbose"
            echo "   ⚠️  Proceeding with commit (timeout, not failure)"
            exit 0
          else
            echo ""
            echo "❌ SECURITY ALERT: Secrets detected in staged files!"
            echo ""
            echo "🔒 Action Required:"
            echo "   1. Remove hardcoded secrets from your code"
            echo "   2. Use environment variables via Infisical instead"
            echo "   3. For local dev: infisical run --env=dev -- <command>"
            echo "   4. Never commit secrets, API keys, tokens, or passwords"
            echo ""
            echo "💡 Common fixes:"
            echo "   • Replace: const apiKey = 'sk-...'"
            echo "   • With: const apiKey = process.env['API_KEY']"
            echo "   • Or use: infisical run --env=dev -- <command>"
            echo ""
            echo "🔍 To see detailed findings:"
            echo "   infisical scan git-changes --staged --verbose"
            echo ""
            exit 1
          fi
        fi
      fail_text: "❌ SECURITY: Secrets detected in staged files. Remove hardcoded secrets before committing."

    # GROUP 1: Type checking (BLOCKING)
    # Full type-check:build blocks commits to catch errors early
    # Uses Turbo cache for fast incremental checking
    # Smart filtering: Skip if only non-TS files changed
    type-check:
      tags: [type-checking, critical, blocking]
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      files: git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx)$' || echo ""
      run: |
        echo "🚨 Running type checking (blocking)..."
        START=$(date +%s%N)
        
        # Smart filtering: Skip if no TS files changed
        STAGED_TS=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx)$' || echo "")
        if [ -z "$STAGED_TS" ]; then
          echo "   ℹ️  No TypeScript files changed - skipping type check"
          exit 0
        fi
        
        # Full type check (blocking - catches all errors early)
        # Turbo automatically uses cache for fast incremental checking
        pnpm type-check:build || exit 1
        
        DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
        echo "✅ Type checking passed (${DURATION}ms)"
      fail_text: |
        ❌ TypeScript type checking failed. Fix before committing.
        
        💡 Fix with:
        pnpm type-check:build
        
        📚 Docs: .cursor/rules/build-error-handling.mdc

    # GROUP 1.5: Prisma & Database Validation (BLOCKING)
    # Validates Prisma schema, database types, and generated files
    prisma-validate:
      tags: [prisma, database, validation, blocking]
      glob: "prisma/schema.prisma"
      run: bash config/lefthook/pre-commit/validate-prisma.sh
      fail_text: |
        ❌ Prisma schema validation failed.
        
        💡 Fix with:
        pnpm prisma validate
        pnpm prisma format

    db-types-validate:
      tags: [prisma, database, validation, blocking]
      glob: "prisma/schema.prisma"
      run: bash config/lefthook/pre-commit/validate-db-types.sh
      fail_text: |
        ❌ Database types are out of sync with schema.
        
        💡 Fix with:
        pnpm prisma:generate:exec

    generated-files-validate:
      tags: [validation, generated, blocking]
      glob: "{prisma/schema.prisma,openapi.json,package.json}"
      run: bash config/lefthook/pre-commit/validate-generated-files.sh
      fail_text: |
        ❌ Generated files are out of date.
        
        💡 Fix with:
        pnpm build:sw
        pnpm generate:api-client

    openapi-validate:
      tags: [api, validation, blocking]
      glob: "openapi.json"
      run: bash config/lefthook/pre-commit/validate-openapi.sh
      fail_text: |
        ❌ OpenAPI schema validation failed.
        
        💡 Fix with:
        jq . openapi.json
        pnpm generate:openapi

    # GROUP 1.6: Auto-regenerate workflows (non-blocking, auto-fix & stage)
    # Auto-regenerates OpenAPI/API client when API routes change
    auto-regenerate-openapi:
      tags: [generation, auto-fix, non-blocking]
      glob: "apps/web/src/app/api/**/route.ts"
      run: |
        echo "🔄 Checking if OpenAPI regeneration needed..."
        set +e
        
        # Check if any API route files changed
        CHANGED_ROUTES=$(git diff --cached --name-only | grep -E "apps/web/src/app/api.*route\.ts$" || echo "")
        if [ -z "$CHANGED_ROUTES" ]; then
          exit 0
        fi
        
        echo "   📝 API routes changed - auto-regenerating OpenAPI spec..."
        pnpm generate:openapi 2>&1 | tail -10
        
        # Check if openapi.json was updated
        if git diff --quiet openapi.json 2>/dev/null; then
          echo "   ✅ OpenAPI spec is up-to-date"
        else
          echo "   ✅ OpenAPI spec regenerated - staging changes..."
          git add openapi.json
          
          # Also regenerate API client if OpenAPI changed
          echo "   📦 Regenerating API client from updated OpenAPI spec..."
          pnpm generate:api-client 2>&1 | tail -10
          
          # Stage API client if it changed
          if ! git diff --quiet packages/database-types/src/api-client/client.generated.ts 2>/dev/null; then
            git add packages/database-types/src/api-client/client.generated.ts
            echo "   ✅ API client regenerated and staged"
          fi
        fi
        
        exit 0
      stage_fixed: true
      fail_text: "💡 OpenAPI/API client auto-regeneration (non-blocking)."

    # Auto-regenerate service worker when source changes
    auto-regenerate-service-worker:
      tags: [generation, auto-fix, non-blocking]
      glob: "{packages/generators/src/bin/minify-service-worker.ts,packages/generators/src/commands/generate-service-worker.ts,packages/web-runtime/src/data/config/category/category-config.ts,package.json}"
      run: |
        echo "🔄 Checking if service worker regeneration needed..."
        set +e
        
        # Check if service worker source files changed
        CHANGED_SW_SOURCES=$(git diff --cached --name-only | grep -E "(minify-service-worker|generate-service-worker|category-config|package\.json)" || echo "")
        if [ -z "$CHANGED_SW_SOURCES" ]; then
          exit 0
        fi
        
        echo "   📝 Service worker sources changed - auto-regenerating..."
        pnpm build:sw 2>&1 | tail -10
        
        # Stage service worker if it changed
        if ! git diff --quiet apps/web/public/service-worker.js 2>/dev/null; then
          git add apps/web/public/service-worker.js
          echo "   ✅ Service worker regenerated and staged"
        else
          echo "   ✅ Service worker is up-to-date"
        fi
        
        exit 0
      stage_fixed: true
      fail_text: "💡 Service worker auto-regeneration (non-blocking)."

    # GROUP 2: Edge functions (non-blocking, isolated, parallel with GROUP 1)
    edge:
      tags: [edge, deno, non-blocking]
      glob: "apps/edge/functions/**/*.ts"
      run: |
        echo "🦕 Checking edge functions (non-blocking)..."
        if command -v deno &> /dev/null; then
          set +e
          OUTPUT=$(pnpm type-check:edge 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          if [ $STATUS -ne 0 ]; then
            if echo "$OUTPUT" | grep -F "packages/edge-runtime/src/utils/email/" >/dev/null; then
              echo "⚠️  Email template type errors ignored (packages/edge-runtime/src/utils/email/**)"
            else
              echo "⚠️  Edge function type-check failed (non-blocking)"
            fi
          fi
          exit 0
        else
          echo "⚠️  Deno not installed - skipping edge function type-check"
          echo "   Install: brew install deno"
          exit 0
        fi
      fail_text: "⚠️  Edge function validation issues (non-blocking)."

    # GROUP 3: Schema validation (runs in parallel with GROUP 1 & 2)
    schemas:
      tags: [validation, mcp, non-blocking]
      glob: "apps/edge/supabase/functions/heyclaude-mcp/**/*.ts"
      run: |
        echo "📋 Validating schemas..."
        set +e
        pnpm validate:zod-schemas 2>&1 | tail -5
        pnpm validate:mcp-tools 2>&1 | tail -5
        exit 0
      fail_text: "⚠️  Schema validation issues (review before merging)."

    # GROUP 4: Linting (non-blocking, auto-fixes staged files)
    linting:
      tags: [linting, code-quality, non-blocking]
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      skip:
        - run: test "$(git diff --cached --name-only | grep -E '\.(ts|tsx)$' | wc -l)" = "0"
      run: |
        echo "🔧 Running linting (non-blocking)..."
        set +e
        pnpm lint:build --fix 2>&1 | tail -3
        git add -u
        exit 0
      stage_fixed: true
      fail_text: "⚠️  Linting issues found (non-blocking - auto-fixed where possible)."

    # GROUP 5: Tests (non-blocking, runs in parallel)
    tests:
      tags: [testing, non-blocking]
      glob: "**/*.{ts,tsx}"
      exclude: 
        - "apps/edge/functions/**"
        - "packages/edge-runtime/src/utils/email/**"
      skip:
        - run: test "$(git diff --cached --name-only | grep -E '\.(ts|tsx)$' | wc -l)" = "0"
      run: |
        echo "🧪 Running affected tests..."
        set +e
        pnpm test --run --changed 2>&1 | tail -15
        exit 0
      fail_text: "⚠️  Tests failed (non-blocking - fix before merging)."

    # GROUP 6: Formatting check (non-blocking, informative)
    formatting:
      tags: [formatting, code-quality, non-blocking]
      glob: "**/*.{ts,tsx,js,jsx,json,css,md}"
      exclude:
        - "node_modules/**"
        - ".next/**"
        - "dist/**"
        - "**/*.generated.*"
      run: |
        echo "✨ Checking code formatting..."
        set +e
        # Only check staged files for speed
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM | grep -E '\.(ts|tsx|js|jsx|json|css|md)$' || true)
        if [ -z "$STAGED_FILES" ]; then
          echo "   ℹ️  No formatted files in this commit"
          exit 0
        fi
        FORMAT_ISSUES=$(echo "$STAGED_FILES" | xargs pnpm prettier --check 2>&1 | grep -c "would reformat" || echo "0")
        if [ "$FORMAT_ISSUES" != "0" ]; then
          echo "   💡 $FORMAT_ISSUES staged file(s) need formatting"
          echo "   Run: pnpm format"
        else
          echo "   ✅ Staged files are properly formatted"
        fi
        exit 0
      fail_text: "💡 Formatting suggestions (non-blocking)."

    # GROUP 7: Quick code insights (non-blocking, fast)
    quick-insights:
      tags: [insights, code-quality, non-blocking]
      glob: "**/*.{ts,tsx}"
      exclude:
        - "node_modules/**"
        - ".next/**"
        - "dist/**"
        - "**/*.generated.*"
      run: |
        echo "💡 Quick code insights..."
        set +e
        
        # Check staged files for common patterns
        STAGED_TS=$(git diff --cached --name-only | grep -E '\.(ts|tsx)$' || true)
        if [ -z "$STAGED_TS" ]; then
          exit 0
        fi
        
        # Check for console.* usage in staged files
        CONSOLE_COUNT=$(git diff --cached | grep -c "console\." || echo "0")
        if [ "$CONSOLE_COUNT" -gt 0 ]; then
          echo "   ⚠️  Found console.* usage in staged files"
          echo "   💡 Replace with logger.* from @heyclaude/web-runtime/logging/*"
        fi
        
        # Check for 'use client' in server-only files
        SERVER_FILES=$(echo "$STAGED_TS" | grep -E "(app/api|actions|server)" || true)
        if [ -n "$SERVER_FILES" ]; then
          CLIENT_DIRECTIVE=$(git diff --cached | grep -c "'use client'" || echo "0")
          if [ "$CLIENT_DIRECTIVE" -gt 0 ]; then
            echo "   ⚠️  Found 'use client' in server-only files"
            echo "   💡 Remove 'use client' from API routes/server actions"
          fi
        fi
        
        # Check for missing 'use cache' in data functions
        DATA_FUNCTIONS=$(git diff --cached | grep -E "export async function get.*\(" | grep -v "'use cache" | wc -l | tr -d ' ')
        if [ "$DATA_FUNCTIONS" -gt 0 ]; then
          echo "   💡 Consider adding 'use cache' to data fetching functions"
        fi
        
        exit 0
      fail_text: "💡 Quick insights (non-blocking)."

    # GROUP 8: Dependency consistency check (non-blocking)
    dependencies-check:
      tags: [dependencies, validation, non-blocking]
      glob: "{package.json,pnpm-lock.yaml}"
      run: bash config/lefthook/pre-commit/check-dependencies.sh
      fail_text: "💡 Dependency consistency check (non-blocking)."

    # GROUP 8.5: Large file detection (non-blocking, informative)
    large-files:
      tags: [validation, filesize, non-blocking]
      glob: "**/*"
      exclude:
        - "node_modules/**"
        - ".next/**"
        - "dist/**"
        - "**/*.zip"
        - "**/*.lock"
        - "pnpm-lock.yaml"
      run: |
        echo "📏 Checking for large files..."
        set +e
        
        STAGED_FILES=$(git diff --cached --name-only --diff-filter=ACM 2>/dev/null || echo "")
        if [ -z "$STAGED_FILES" ]; then
          exit 0
        fi
        
        LARGE_FILES=""
        BLOCKING_FILES=""
        
        for file in $STAGED_FILES; do
          if [ ! -f "$file" ]; then
            continue
          fi
          
          # Get file size in bytes
          SIZE=$(stat -f "%z" "$file" 2>/dev/null || stat -c "%s" "$file" 2>/dev/null || echo "0")
          
          if [ "$SIZE" -gt 10485760 ]; then
            # >10MB - blocking
            SIZE_MB=$((SIZE / 1048576))
            BLOCKING_FILES="$BLOCKING_FILES\n   ❌ $file (${SIZE_MB}MB - BLOCKING)"
          elif [ "$SIZE" -gt 1048576 ]; then
            # >1MB - warning
            SIZE_MB=$((SIZE / 1048576))
            LARGE_FILES="$LARGE_FILES\n   ⚠️  $file (${SIZE_MB}MB)"
          fi
        done
        
        if [ -n "$BLOCKING_FILES" ]; then
          echo "❌ Files >10MB detected (blocking):"
          echo -e "$BLOCKING_FILES"
          echo ""
          echo "💡 Consider using Git LFS for large binary files"
          echo "   Install: git lfs install"
          echo "   Track: git lfs track '*.zip' '*.pdf' etc."
          exit 1
        fi
        
        if [ -n "$LARGE_FILES" ]; then
          echo "⚠️  Large files detected (>1MB):"
          echo -e "$LARGE_FILES"
          echo ""
          echo "💡 Consider using Git LFS for binary files"
        else
          echo "   ✅ No large files detected"
        fi
        
        exit 0
      fail_text: "❌ Files >10MB detected. Use Git LFS for large binary files."

    # GROUP 9: Pre-commit summary (informational, runs last)
    summary:
      tags: [summary, informational]
      run: |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "📋 Pre-commit Summary"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✅ Secrets scanning: PASSED (blocking - scanned all files including generated)"
        echo "✅ Type checking: PASSED (blocking - full type-check:build)"
        echo "✅ Prisma validation: PASSED (blocking)"
        echo "✅ Database types: PASSED (blocking)"
        echo "✅ Generated files: PASSED (blocking)"
        echo "✅ OpenAPI schema: PASSED (blocking)"
        echo ""
        echo "💡 Quick Actions (if needed):"
        echo "   • Format code:        pnpm format"
        echo "   • Fix linting:        pnpm lint:build --fix"
        echo "   • Run tests:          pnpm test"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        exit 0
      fail_text: "📋 Summary (informational)."

# ============================================================================
# PRE-PUSH: Secrets scanning and type checking block, everything else is non-blocking
# Secrets scanning and TypeScript type checking block pushes
# Build, linting, and tests run but don't block
# ============================================================================
pre-push:
  parallel: false
  commands:
    # CRITICAL SECURITY - Secrets scanning (BLOCKING)
    # Must run first and block pushes if secrets are detected
    # Scans ALL uncommitted files including generated files (security critical)
    secrets-scan:
      tags: [security, critical, blocking]
      run: |
        echo "🔒 Scanning for secrets in uncommitted changes..."
        START=$(date +%s%N)
        
        # Check if Infisical CLI is available
        if ! command -v infisical >/dev/null 2>&1; then
          echo "⚠️  Infisical CLI not found - secrets scanning skipped"
          echo "   Install: brew install infisical/get-cli/infisical"
          echo "   Or: https://infisical.com/docs/cli/overview"
          echo "   ⚠️  WARNING: Secrets scanning is disabled without Infisical CLI"
          echo "   💡 CI/CD will still scan with TruffleHog (see .github/workflows/security.yml)"
          exit 0
        fi
        
        # Scan all uncommitted changes for secrets (BLOCKING)
        # Scans ALL files including generated files - security critical
        # Without --staged: Scans all uncommitted changes (staged + unstaged)
        # --silent: Disable tip/info messages for cleaner output
        # --redact: Redact secrets from output (security best practice)
        # Timeout: 60 seconds max (more time for larger changes)
        if timeout 60s infisical scan git-changes --silent --redact 2>&1; then
          DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
          echo "✅ Secrets scan passed (${DURATION}ms)"
        else
          SCAN_EXIT=$?
          if [ $SCAN_EXIT -eq 124 ]; then
            echo ""
            echo "⏱️  Secrets scan timed out (>60s)"
            echo "   💡 This usually means large files or many changes"
            echo "   💡 Run manually: infisical scan git-changes --verbose"
            echo "   ⚠️  Proceeding with push (timeout, not failure)"
            exit 0
          fi
          echo ""
          echo "❌ SECURITY ALERT: Secrets detected in uncommitted changes!"
          echo ""
          echo "🔒 Action Required:"
          echo "   1. Remove hardcoded secrets from your code"
          echo "   2. Use environment variables via Infisical instead"
          echo "   3. For local dev: infisical run --env=dev -- <command>"
          echo "   4. Never commit secrets, API keys, tokens, or passwords"
          echo ""
          echo "💡 Common fixes:"
          echo "   • Replace: const apiKey = 'sk-...'"
          echo "   • With: const apiKey = process.env['API_KEY']"
          echo "   • Or use: infisical run --env=dev -- <command>"
          echo ""
          echo "🔍 To see detailed findings (without redaction):"
          echo "   infisical scan git-changes --verbose"
          echo ""
          exit 1
        fi
      fail_text: "❌ SECURITY: Secrets detected in uncommitted changes. Remove hardcoded secrets before pushing."

    # Type checking (blocking check)
    type-check:
      tags: [type-checking, critical, blocking]
      run: |
        echo "🔍 Running type checking..."
        START=$(date +%s%N)
        
        echo "  ▶️  TypeScript type checking..."
        pnpm type-check:build || exit 1
        
        DURATION=$(( ($(date +%s%N) - START) / 1000000 ))
        echo "✅ Type checking passed (${DURATION}ms)"
      fail_text: |
        ❌ TypeScript type checking failed. Fix before pushing.
        
        💡 Fix with:
        pnpm type-check:build
        
        📚 Docs: .cursor/rules/build-error-handling.mdc

    # Prisma migration validation (non-blocking, informative)
    migrations-validate:
      tags: [prisma, migrations, validation, non-blocking]
      glob: "supabase/migrations/**/*.sql"
      run: bash config/lefthook/pre-push/validate-migrations.sh
      fail_text: |
        ❌ Prisma migration validation failed.
        
        💡 Fix migration issues:
        - Remove COPY/INSERT statements (migrations must be schema-only)
        - Follow naming: supabase/migrations/YYYYMMDDHHMMSS_name.sql
        
        📚 Docs: .cursor/rules/supabase-migrations.mdc

    # Dependency vulnerability scanning (non-blocking, informative)
    dependency-audit:
      tags: [security, dependencies, non-blocking]
      run: |
        echo "🔍 Checking for dependency vulnerabilities..."
        START=$(date +%s%N)
        
        set +e
        AUDIT_OUTPUT=$(pnpm audit --audit-level=moderate 2>&1)
        AUDIT_STATUS=$?
        
        if [ $AUDIT_STATUS -ne 0 ]; then
          echo "   ⚠️  Dependency vulnerabilities detected:"
