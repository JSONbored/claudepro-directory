      run: |
        echo "🔧 Running linting (non-blocking)..."
        set +e
        pnpm lint:build 2>&1 | tail -10
        exit 0
      fail_text: |
        ⚠️  Linting issues found (non-blocking).
        
        💡 Fix with:
        pnpm lint:build --fix

    # Vitest unit tests (non-blocking)
    tests:
      tags: [testing, vitest, non-blocking]
      run: |
        echo "🧪 Running Vitest unit tests (non-blocking)..."
        set +e
        # Check if there are any test files before running
        TEST_FILES=$(find . -name "*.test.ts" -o -name "*.test.tsx" 2>/dev/null | grep -v node_modules | head -1)
        if [ -z "$TEST_FILES" ]; then
          echo "   ℹ️  No test files found - skipping"
          exit 0
        fi
        # Run tests and capture output
        TEST_OUTPUT=$(pnpm test --run 2>&1)
        TEST_STATUS=$?
        echo "$TEST_OUTPUT" | tail -20
        if [ $TEST_STATUS -ne 0 ]; then
          echo "   ⚠️  Tests failed (non-blocking - fix before merging)"
        else
          echo "   ✅ Tests passed"
        fi
        exit 0
      fail_text: "⚠️  Vitest tests failed (non-blocking)."

