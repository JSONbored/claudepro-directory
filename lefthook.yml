# ============================================================================
# COMMIT-MSG: Enforce conventional commits (with WIP support)
# ============================================================================
commit-msg:
  commands:
    conventional:
      tags: [commit-msg, validation]
      run: |
        MSG=$(cat {1})
        
        # Skip merge commits
        if echo "$MSG" | grep -qE "^Merge (branch|pull request)"; then
          exit 0
        fi
        
        # Skip fixup/squash commits
        if echo "$MSG" | grep -qE "^(fixup|squash)!"; then
          exit 0
        fi
        
        # Allow WIP commits with reduced validation
        if echo "$MSG" | grep -qE "^wip"; then
          echo "ℹ️  WIP commit detected - reduced validation"
          echo "   Remember to use proper conventional commit format when squashing/rebasing"
          exit 0
        fi
        
        # Validate conventional commit format
        if ! echo "$MSG" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,}"; then
          echo "⚠️  Commit message doesn't follow Conventional Commits format"
          echo ""
          echo "Format: type(scope): description"
          echo "Types: feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert"
          echo ""
          echo "Examples:"
          echo "  feat(auth): add Google OAuth"
          echo "  fix(api): resolve race condition"
          echo "  wip: experimenting with new feature (skips validation)"
          echo ""
          echo "💡 Tip: Set LEFTHOOK_EXCLUDE=commit-msg to skip this check"
          exit 1
        fi

# ============================================================================
# POST-MERGE: Auto-install dependencies when package.json changes
# ============================================================================
post-merge:
  piped: true
  commands:
    deps:
      tags: [dependencies, auto-install]
      files: git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD
      glob: "{package.json,pnpm-lock.yaml}"
      run: |
        echo "📦 Dependencies changed. Installing updates..."
        pnpm install
      fail_text: |
        ⚠️  Dependency installation failed. Run 'pnpm install' manually.
        
        💡 This usually happens when:
        - Network issues during install
        - Package registry issues
        - Lock file conflicts
        
        💡 Fix with:
        pnpm install

    # Auto-sync database types when Prisma schema changes
    db-types-sync:
      tags: [prisma, database, auto-fix]
      files: git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD
      glob: "prisma/schema.prisma"
      run: |
        echo "🔄 Prisma schema changed. Syncing database types..."
        set +e
        pnpm prisma:generate:exec 2>&1 | tail -10
        echo "   ✅ Database types synced"
        exit 0
      fail_text: "⚠️  Database type sync failed. Run 'pnpm prisma:generate:exec' manually."

post-checkout:
  piped: true
  commands:
    deps-check:
      tags: [dependencies, auto-install]
      files: git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD
      glob: "{package.json,pnpm-lock.yaml}"
      run: |
        echo "📦 Dependencies may have changed after checkout. Checking..."
        # Only install if package.json or lock file changed
        if git diff-tree -r --name-only --no-commit-id ORIG_HEAD HEAD | grep -qE "(package\.json|pnpm-lock\.yaml)"; then
          echo "   Installing dependencies..."
          pnpm install
        else
          echo "   ✅ No dependency changes detected"
        fi
      fail_text: "⚠️  Dependency check failed. Run 'pnpm install' manually."

# ============================================================================
# CUSTOM TASK GROUPS
# ============================================================================
# Task groups allow on-demand execution of related commands
# Usage: lefthook run <group-name>

# Fixer group: Bulk fixes (format, lint, type-check)
fixer:
  commands:
    format:
      tags: [formatting, fixer]
      run: |
        echo "✨ Formatting code..."
        pnpm format
      stage_fixed: true
    lint-fix:
      tags: [linting, fixer]
      run: |
        echo "🔧 Fixing linting issues..."
        pnpm lint:build:fix
      stage_fixed: true
    type-check:
      tags: [type-checking, fixer]
      run: |
        echo "🔍 Running type check..."
        pnpm type-check:build

# Quality group: Code quality checks
quality:
  commands:
    unused:
      tags: [quality]
      run: pnpm analyze:unused
    circular:
      tags: [quality]
      run: pnpm analyze:circular
    all:
      tags: [quality]
      run: pnpm analyze:all

# Security group: Security checks
security:
  commands:
    secrets:
      tags: [security]
      run: infisical scan git-changes --verbose
    audit:
      tags: [security]
      run: pnpm audit

# ============================================================================
# CONFIGURATION
# ============================================================================
colors: true
no_tty: false
min_version: 1.13.0

# ============================================================================
# USAGE TIPS & HELPFUL COMMANDS
# ============================================================================
# Install Infisical CLI (required for secrets scanning):
#   brew install infisical/get-cli/infisical
#   Or: https://infisical.com/docs/cli/overview
#
# Authenticate Infisical:
#   infisical login
#
# Verify secrets scanning works:
#   infisical scan git-changes --staged --verbose
#
# Skip specific commands by tag:
#   LEFTHOOK_EXCLUDE=security git commit          # Skip secrets scan
#   LEFTHOOK_EXCLUDE=type-checking git commit     # Skip type check
#   LEFTHOOK_EXCLUDE=linting git commit           # Skip linting
#   LEFTHOOK_EXCLUDE=testing git push             # Skip tests
#   LEFTHOOK_EXCLUDE=quality git push             # Skip quality checks
#   LEFTHOOK_EXCLUDE=performance git push         # Skip performance checks
#   LEFTHOOK_EXCLUDE=prisma git commit            # Skip Prisma validation
#   LEFTHOOK_EXCLUDE=validation git commit         # Skip all validation
#   LEFTHOOK_EXCLUDE=non-blocking git commit      # Skip all non-blocking checks
#
# Skip commit-msg validation:
#   LEFTHOOK_EXCLUDE=commit-msg git commit
#
# Skip secrets scanning (NOT RECOMMENDED - security risk):
#   LEFTHOOK_EXCLUDE=secrets-scan git commit
#   LEFTHOOK_EXCLUDE=secrets-scan git push
#
# Skip build verification (when env vars missing):
#   LEFTHOOK_EXCLUDE=build git push
#
# Use WIP commits for rapid iteration:
#   git commit -m "wip: testing new approach"
#
# Verbose debugging:
#   LEFTHOOK_VERBOSE=1 git commit
#
# Skip all hooks (use sparingly):
#   git commit --no-verify
#   git push --no-verify
#
# ============================================================================
# TAGS REFERENCE
# ============================================================================
# Tags allow conditional execution of commands:
#
# Security:
#   - security: Secrets scanning
#   - critical: Blocking security/correctness checks
#
# Validation:
#   - validation: All validation checks (Prisma, OpenAPI, etc.)
#   - prisma: Prisma-related checks
#   - database: Database-related checks
#   - api: API-related checks
#
# Code Quality:
#   - type-checking: TypeScript type checking
#   - linting: ESLint checks
#   - formatting: Prettier checks
#   - code-quality: Code quality analysis
#   - quality: All quality checks
#
# Testing:
#   - testing: Test execution
#
# Performance:
#   - performance: Performance analysis
#   - bundle: Bundle size checks
#
# Execution Control:
#   - blocking: Commands that block commits/pushes
#   - non-blocking: Commands that don't block
#
# Examples:
#   LEFTHOOK_EXCLUDE=non-blocking git commit      # Only blocking checks
#   LEFTHOOK_EXCLUDE=quality,performance git push  # Skip quality/performance
#   LEFTHOOK_EXCLUDE=prisma git commit             # Skip Prisma validation
#
# ============================================================================
# HELPFUL ANALYSIS COMMANDS
# ============================================================================
# Code Quality:
#   pnpm analyze:unused        # Find unused exports
#   pnpm analyze:circular     # Find circular dependencies
#   pnpm analyze:all          # Run all analyses
#
# Architecture:
#   npx ast-grep scan --rule config/coderabbit/ast-grep-rules/logging-patterns.yml
#   npx ast-grep scan --rule config/coderabbit/ast-grep-rules/security-patterns.yml
#
# Formatting:
#   pnpm format               # Auto-fix formatting
#   pnpm format:check         # Check formatting
#
# Type Checking:
#   pnpm type-check:build     # Full type check
#   pnpm type-check:web       # Web app only
#   pnpm type-check:packages  # Packages only
#
# Testing:
#   pnpm test                 # Run tests
#   pnpm test:watch           # Watch mode
#   pnpm test:visual          # Playwright tests
#
# Build & Deploy:
#   pnpm build                # Production build
#   pnpm build:analyze        # Bundle analysis
#   pnpm deploy:web           # Deploy web app
#   pnpm deploy:edge          # Deploy edge functions
# ============================================================================
