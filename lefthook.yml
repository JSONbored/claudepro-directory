          echo "   ℹ️  No Playwright spec files found - skipping"
          exit 0
        fi
        
        # Run Playwright tests (non-blocking)
        TEST_OUTPUT=$(pnpm test:visual --reporter=list 2>&1)
        TEST_STATUS=$?
        echo "$TEST_OUTPUT" | tail -30
        
        if [ $TEST_STATUS -ne 0 ]; then
          echo "   ⚠️  Playwright tests failed (non-blocking - fix before merging)"
        else
          echo "   ✅ Playwright tests passed"
        fi
        
